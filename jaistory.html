\/span> <span class=\"sent\">The teacher <input type=\"text\" class=\"iq-input inline\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"?\"> that Joshua is going to say something. <span class=\"given\">( notice )<\/span><\/span><\/div><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<div class=\"q iq\" data-answer=\"to run\"><div><span class=\"num\">11.<\/span> <span class=\"sent\">I wanted <input type=\"text\" class=\"iq-input inline\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"?\"> away. <span class=\"given\">( run )<\/span><\/span><\/div><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<div class=\"q iq\" data-answer=\"felt\"><div><span class=\"num\">12.<\/span> <span class=\"sent\">I <input type=\"text\" class=\"iq-input inline\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"?\"> embarrassed when everyone laughed. <span class=\"given\">( feel )<\/span><\/span><\/div><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<\/div>\n<div class=\"part\">\n<div class=\"part-h\"><span class=\"badge\">유형 4<\/span><h2>조건부 부분 영작 (Sentence Completion)<\/h2><\/div>\n<div class=\"howto\">우리말 뜻과 <b>주어진 핵심 단어<\/b>를 반드시 활용하여 <b>영어 문장을 완성<\/b>하고 <b>확인<\/b>을 누르세요. (단어의 형태는 바꿔도 좋아요. 대소문자·마침표·쉼표는 채점에서 무시됩니다.)<\/div>\n<div class=\"q iq\" data-answer=\"Thanks to an avatar robot, he can still attend class.|Thanks to an avatar robot, he can still attend the class.\" data-example=\"Thanks to an avatar robot, he can still attend class.\"><div><span class=\"num\">13.<\/span><span class=\"ko\">아바타 로봇 덕분에 그는 여전히 수업에 참여할 수 있다.<\/span><\/div><div class=\"cond\">조건: <span class=\"chip\">can<\/span><span class=\"chip\">attend<\/span><span class=\"chip\">still<\/span><\/div><input type=\"text\" class=\"iq-input full\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"영어 문장을 입력하세요\"><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><button type=\"button\" class=\"iq-reveal\">정답 예시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<div class=\"q iq\" data-answer=\"When Joshua wants to say something, he sends a signal to the robot.\" data-example=\"When Joshua wants to say something, he sends a signal to the robot.\"><div><span class=\"num\">14.<\/span><span class=\"ko\">Joshua가 무언가 말하고 싶을 때 그는 로봇에게 신호를 보낸다.<\/span><\/div><div class=\"cond\">조건: <span class=\"chip\">when<\/span><span class=\"chip\">signal<\/span><span class=\"chip\">send<\/span><\/div><input type=\"text\" class=\"iq-input full\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"영어 문장을 입력하세요\"><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><button type=\"button\" class=\"iq-reveal\">정답 예시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<div class=\"q iq\" data-answer=\"Such robots help them to be part of the school.|Such robots help them be part of the school.\" data-example=\"Such robots help them to be part of the school.\"><div><span class=\"num\">15.<\/span><span class=\"ko\">그런 로봇들은 그들이 학교의 일원이 되도록 돕는다.<\/span><\/div><div class=\"cond\">조건: <span class=\"chip\">help<\/span><span class=\"chip\">be part of<\/span><\/div><input type=\"text\" class=\"iq-input full\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"영어 문장을 입력하세요\"><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><button type=\"button\" class=\"iq-reveal\">정답 예시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<div class=\"q iq\" data-answer=\"I was laughed at by everyone.\" data-example=\"I was laughed at by everyone.\"><div><span class=\"num\">16.<\/span><span class=\"ko\">나는 모두에게 비웃음을 당했다.<\/span><\/div><div class=\"cond\">조건: <span class=\"chip\">laughed at<\/span><span class=\"chip\">by<\/span><span class=\"chip\">everyone<\/span><\/div><input type=\"text\" class=\"iq-input full\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"영어 문장을 입력하세요\"><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><button type=\"button\" class=\"iq-reveal\">정답 예시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<\/div>\n<div class=\"scorebox\" id=\"scorebox\"><\/div>\n<div class=\"wb-answers hide\" id=\"answerSheet\"><div class=\"a-h\">✅ 정답 및 해설<\/div>\n<div class=\"a-note\">pp.146~147 「교실 발표의 용기」 · 각 문제의 <b>출제 포인트<\/b>를 함께 읽으며 스스로 채점해 보세요!<\/div>\n<div class=\"a-part\">유형 1 · 어순 배열<\/div>\n<div class=\"a\"><span class=\"num\">1.<\/span> <span class=\"sol\"><b>I got the courage to raise my hand<\/b><\/span><div class=\"point\">&#x27;~할 용기&#x27;처럼 명사 courage 뒤에서 꾸며줄 때는 to부정사(to raise)를 써!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">2.<\/span> <span class=\"sol\"><b>Our teacher asked us to introduce ourselves<\/b><\/span> &nbsp;<span style=\"color:var(--warn)\">(함정 단어: we ✗)<\/span><div class=\"point\">ask 다음엔 &#x27;목적어(us) + to부정사&#x27;가 와. 목적어 자리라 we가 아니라 us를 써야 해!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">3.<\/span> <span class=\"sol\"><b>He is too ill to go to school<\/b><\/span><div class=\"point\">&#x27;too + 형용사 + to부정사&#x27;는 &#x27;너무 ~해서 …할 수 없다&#x27;는 뜻이야.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">4.<\/span> <span class=\"sol\"><b>A light on the robot&#x27;s head starts to blink<\/b><\/span><div class=\"point\">진짜 주어는 A light(단수)라서 동사에 -s를 붙여 starts로 써야 해!<\/div><\/div>\n<div class=\"a-part\">유형 2 · 어법 오류 수정<\/div>\n<div class=\"a\"><span class=\"num\">5.<\/span> sit → <span class=\"sol\"><b>sits<\/b><\/span><div class=\"point\">주어 A robot이 3인칭 단수라서 동사에 -s를 붙여 sits로!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">6.<\/span> seen → <span class=\"sol\"><b>saw<\/b><\/span><div class=\"point\">see의 과거는 saw야(see-saw-seen). seen은 과거분사라 여기선 안 돼!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">7.<\/span> speak → <span class=\"sol\"><b>speaking<\/b><\/span><div class=\"point\">전치사 after 뒤에는 동사원형이 아니라 동명사(~ing)를 써!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">8.<\/span> naming → <span class=\"sol\"><b>named<\/b><\/span><div class=\"point\">&#x27;Joshua라고 이름 붙여진&#x27; 수동의 뜻이라 과거분사 named를 써야 해!<\/div><\/div>\n<div class=\"a-part\">유형 3 · 빈칸 어형 변화<\/div>\n<div class=\"a\"><span class=\"num\">9.<\/span> pound → <span class=\"sol\"><b>pounded<\/b><\/span><div class=\"point\">지나간 일이니까 과거형! pound는 규칙동사라 -ed만 붙이면 돼.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">10.<\/span> notice → <span class=\"sol\"><b>notices<\/b><\/span><div class=\"point\">The teacher는 3인칭 단수라 현재형 동사에 -s를 붙여 notices로!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">11.<\/span> run → <span class=\"sol\"><b>to run<\/b><\/span><div class=\"point\">want 뒤에는 to부정사가 와서 &#x27;~하고 싶다&#x27;가 돼.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">12.<\/span> feel → <span class=\"sol\"><b>felt<\/b><\/span><div class=\"point\">feel은 불규칙동사! 과거는 felt야(feel-felt-felt).<\/div><\/div>\n<div class=\"a-part\">유형 4 · 조건부 부분 영작<\/div>\n<div class=\"a\"><span class=\"num\">13.<\/span> <span class=\"sol\"><b>Thanks to an avatar robot, he can still attend class.<\/b><\/span><div class=\"point\">조동사 can 뒤에는 항상 동사원형(attend)을 써!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">14.<\/span> <span class=\"sol\"><b>When Joshua wants to say something, he sends a signal to the robot.<\/b><\/span><div class=\"point\">&#x27;~할 때&#x27;는 접속사 when으로! 주어 he가 단수라 sends로 -s를 붙여.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">15.<\/span> <span class=\"sol\"><b>Such robots help them to be part of the school.<\/b><\/span><div class=\"point\">help 뒤엔 &#x27;목적어 + (to)동사원형&#x27;이 와. to는 있어도 없어도 돼!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">16.<\/span> <span class=\"sol\"><b>I was laughed at by everyone.<\/b><\/span><div class=\"point\">laugh at(비웃다)의 수동태는 be laughed at! 전치사 at을 빠뜨리면 안 돼.<\/div><\/div><\/div>", "150-151": "<div class=\"wb-ctrl\"><button type=\"button\" class=\"wb-gradeall\">📊 전체 채점<\/button><button type=\"button\" class=\"wb-toggle\">정답·해설 보기<\/button><\/div>\n<div class=\"wb-lead\">✏️ 4가지 유형 16문항 — 단어를 드래그하거나 입력한 뒤 <b>전체 채점<\/b>을 눌러 점수를 확인하세요. 문제마다 <b>확인<\/b>으로 즉시 채점도 돼요.<\/div>\n<div class=\"part\">\n<div class=\"part-h\"><span class=\"badge\">유형 1<\/span><h2>어순 배열 (Unscramble)<\/h2><\/div>\n<div class=\"howto\">단어를 <b>정답칸으로 끌어다 놓아(드래그)<\/b> 우리말 뜻에 맞게 배열하세요. 단어를 <b>클릭<\/b>해도 이동합니다. ⚠️ 표시 문제엔 <b>쓰지 않는 함정 단어 1개<\/b>가 있어요!<\/div>\n<div class=\"q dnd\" data-answer=\"Suffering and happiness are inseparable\" data-trap=\"is\"><div><span class=\"num\">1.<\/span><span class=\"ko\">고통과 행복은 분리할 수 없다.<\/span> <span class=\"warn-tag\">⚠️ 함정 1개<\/span><\/div><div class=\"answer-zone empty\" data-ph=\"⬇ 여기에 단어를 순서대로 끌어다 놓으세요 (함정 주의!)\"><\/div><div class=\"bank\"><span class=\"chip\">are<\/span><span class=\"chip\">Suffering<\/span><span class=\"chip\">and<\/span><span class=\"chip\">is<\/span><span class=\"chip\">happiness<\/span><span class=\"chip\">inseparable<\/span><\/div><div class=\"dnd-ctrl\"><button type=\"button\" class=\"btn-check\">확인<\/button><button type=\"button\" class=\"btn-reset\">다시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"hint-drag\">💡 정답칸의 단어를 클릭하면 아래로 되돌아가요. 드래그로 순서도 바꿀 수 있어요.<\/div><div class=\"u-line\"><\/div><\/div>\n<div class=\"q dnd\" data-answer=\"Happiness cannot exist without suffering\"><div><span class=\"num\">2.<\/span><span class=\"ko\">행복은 고통 없이 존재할 수 없다.<\/span><\/div><div class=\"answer-zone empty\" data-ph=\"⬇ 여기에 단어를 순서대로 끌어다 놓으세요\"><\/div><div class=\"bank\"><span class=\"chip\">Happiness<\/span><span class=\"chip\">suffering<\/span><span class=\"chip\">without<\/span><span class=\"chip\">cannot<\/span><span class=\"chip\">exist<\/span><\/div><div class=\"dnd-ctrl\"><button type=\"button\" class=\"btn-check\">확인<\/button><button type=\"button\" class=\"btn-reset\">다시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"u-line\"><\/div><\/div>\n<div class=\"q dnd\" data-answer=\"Mr. Gelle was one of two passengers who survived the crash\"><div><span class=\"num\">3.<\/span><span class=\"ko\">Gelle 씨는 추락에서 살아남은 두 승객 중 한 명이었다.<\/span><\/div><div class=\"answer-zone empty\" data-ph=\"⬇ 여기에 단어를 순서대로 끌어다 놓으세요\"><\/div><div class=\"bank\"><span class=\"chip\">two<\/span><span class=\"chip\">one<\/span><span class=\"chip\">of<\/span><span class=\"chip\">the<\/span><span class=\"chip\">Mr.<\/span><span class=\"chip\">crash<\/span><span class=\"chip\">survived<\/span><span class=\"chip\">who<\/span><span class=\"chip\">Gelle<\/span><span class=\"chip\">passengers<\/span><span class=\"chip\">was<\/span><\/div><div class=\"dnd-ctrl\"><button type=\"button\" class=\"btn-check\">확인<\/button><button type=\"button\" class=\"btn-reset\">다시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"u-line\"><\/div><\/div>\n<div class=\"q dnd\" data-answer=\"There is a very close connection between suffering and happiness\"><div><span class=\"num\">4.<\/span><span class=\"ko\">고통과 행복 사이에는 매우 밀접한 관계가 있다.<\/span><\/div><div class=\"answer-zone empty\" data-ph=\"⬇ 여기에 단어를 순서대로 끌어다 놓으세요\"><\/div><div class=\"bank\"><span class=\"chip\">very<\/span><span class=\"chip\">is<\/span><span class=\"chip\">suffering<\/span><span class=\"chip\">a<\/span><span class=\"chip\">close<\/span><span class=\"chip\">connection<\/span><span class=\"chip\">and<\/span><span class=\"chip\">There<\/span><span class=\"chip\">between<\/span><span class=\"chip\">happiness<\/span><\/div><div class=\"dnd-ctrl\">< c glasses because of the bad weather.\"><div><span class=\"num\">14.<\/span><span class=\"ko\">러시아인들은 나쁜 날씨 때문에 플라스틱 안경을 선호한다.<\/span><\/div><div class=\"cond\">조건: <span class=\"chip\">prefer<\/span><span class=\"chip\">because of<\/span><\/div><input type=\"text\" class=\"iq-input full\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"영어 문장을 입력하세요\"><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><button type=\"button\" class=\"iq-reveal\">정답 예시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<div class=\"q iq\" data-answer=\"Blow the balloon until it gets as big as an egg.\" data-example=\"Blow the balloon until it gets as big as an egg.\"><div><span class=\"num\">15.<\/span><span class=\"ko\">풍선을 달걀만큼 커질 때까지 불어라.<\/span><\/div><div class=\"cond\">조건: <span class=\"chip\">blow<\/span><span class=\"chip\">until<\/span><span class=\"chip\">as big as<\/span><\/div><input type=\"text\" class=\"iq-input full\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"영어 문장을 입력하세요\"><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><button type=\"button\" class=\"iq-reveal\">정답 예시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<div class=\"q iq\" data-answer=\"Remove the balloon using a pin.\" data-example=\"Remove the balloon using a pin.\"><div><span class=\"num\">16.<\/span><span class=\"ko\">핀을 사용해 풍선을 제거해라.<\/span><\/div><div class=\"cond\">조건: <span class=\"chip\">remove<\/span><span class=\"chip\">using<\/span><\/div><input type=\"text\" class=\"iq-input full\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"영어 문장을 입력하세요\"><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><button type=\"button\" class=\"iq-reveal\">정답 예시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<\/div>\n<div class=\"scorebox\" id=\"scorebox\"><\/div>\n<div class=\"wb-answers hide\" id=\"answerSheet\"><div class=\"a-h\">✅ 정답 및 해설<\/div>\n<div class=\"a-note\">pp.150~151 「1회 모의고사」 · 각 문제의 <b>출제 포인트<\/b>를 함께 읽으며 스스로 채점해 보세요!<\/div>\n<div class=\"a-part\">유형 1 · 어순 배열<\/div>\n<div class=\"a\"><span class=\"num\">1.<\/span> <span class=\"sol\"><b>Suffering and happiness are inseparable<\/b><\/span> &nbsp;<span style=\"color:var(--warn)\">(함정 단어: is ✗)<\/span><div class=\"point\">주어가 &#x27;A and B&#x27;라서 복수야! 그래서 be동사는 is가 아니라 are를 써야 해.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">2.<\/span> <span class=\"sol\"><b>Happiness cannot exist without suffering<\/b><\/span><div class=\"point\">조동사 cannot 다음엔 동사원형 그대로! exist를 바꾸지 않아.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">3.<\/span> <span class=\"sol\"><b>Mr. Gelle was one of two passengers who survived the crash<\/b><\/span><div class=\"point\">앞의 passengers(사람)를 꾸며주니까 관계대명사 who를 써 줘.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">4.<\/span> <span class=\"sol\"><b>There is a very close connection between suffering and happiness<\/b><\/span><div class=\"point\">&#x27;~가 있다&#x27;는 There is/are! 뒤에 단수 connection이 오니까 is를 써.<\/div><\/div>\n<div class=\"a-part\">유형 2 · 어법 오류 수정<\/div>\n<div class=\"a\"><span class=\"num\">5.<\/span> praise → <span class=\"sol\"><b>praised<\/b><\/span><div class=\"point\">&#x27;~되었다&#x27;는 수동태! be동사 뒤에는 과거분사(p.p.)인 praised가 와야 해.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">6.<\/span> swimmed → <span class=\"sol\"><b>swam<\/b><\/span><div class=\"point\">swim은 불규칙 동사라 과거형이 swimmed가 아니라 swam이야.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">7.<\/span> have survived → <span class=\"sol\"><b>has survived<\/b><\/span><div class=\"point\">주어 a minister가 3인칭 단수라서 현재완료는 have가 아니라 has를 써!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">8.<\/span> look → <span class=\"sol\"><b>looking<\/b><\/span><div class=\"point\">전치사 Despite 뒤에는 동 /span><input type=\"text\" class=\"iq-input\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"정답 입력\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<\/div>\n<div class=\"part\">\n<div class=\"part-h\"><span class=\"badge\">유형 3<\/span><h2>빈칸 어형 변화 (Word Form)<\/h2><\/div>\n<div class=\"howto\">괄호 안의 <b>기본형 단어를 문장에 맞게 알맞은 형태로 바꿔<\/b> 빈칸에 입력하고 <b>확인<\/b>을 누르세요.<\/div>\n<div class=\"q iq\" data-answer=\"visited\"><div><span class=\"num\">9.<\/span> <span class=\"sent\">In the 1850s, a Catholic priest <input type=\"text\" class=\"iq-input inline\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"?\"> Yoro. <span class=\"given\">( visit )<\/span><\/span><\/div><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<div class=\"q iq\" data-answer=\"to escape\"><div><span class=\"num\">10.<\/span> <span class=\"sent\">It gives the insects extra time <input type=\"text\" class=\"iq-input inline\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"?\"> from predators. <span class=\"given\">( escape )<\/span><\/span><\/div><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<div class=\"q iq\" data-answer=\"using\"><div><span class=\"num\">11.<\/span> <span class=\"sent\">They communicate with each other by <input type=\"text\" class=\"iq-input inline\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"?\"> clicks and whistle-like sounds. <span class=\"given\">( use )<\/span><\/span><\/div><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\ orebox\"><\/div>\n<div class=\"wb-answers hide\" id=\"answerSheet\"><div class=\"a-h\">✅ 정답 및 해설<\/div>\n<div class=\"a-note\">pp.160~161 「캥거루」 · 각 문제의 <b>출제 포인트<\/b>를 함께 읽으며 스스로 채점해 보세요!<\/div>\n<div class=\"a-part\">유형 1 · 어순 배열<\/div>\n<div class=\"a\"><span class=\"num\">1.<\/span> <span class=\"sol\"><b>They have large feet and powerful hind legs<\/b><\/span><div class=\"point\">and로 large feet와 powerful hind legs 두 덩어리를 나란히 연결해! foot의 복수는 불규칙이라 feet.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">2.<\/span> <span class=\"sol\"><b>Turkish people traditionally serve tea with little cubes of sugar<\/b><\/span><div class=\"point\">&#x27;~와 함께&#x27;는 with로! 습관처럼 늘 하는 일이라 현재시제 serve를 그대로 써.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">3.<\/span> <span class=\"sol\"><b>A brave knight kills a dragon and saves a princess<\/b><\/span> &nbsp;<span style=\"color:var(--warn)\">(함정 단어: kill ✗)<\/span><div class=\"point\">주어가 A brave knight로 3인칭 단수라 동사에 -s! kills, saves 둘 다 -s를 붙이고 and로 연결해. 그냥 kill을 쓰면 안 돼.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">4.<\/span> <span class=\"sol\"><b>Türkiye has the highest consumption of tea for each person<\/b><\/span><div class=\"point\">&#x27;가장 ~한&#x27;은 최상급! the highest처럼 앞에 the를 꼭 붙여줘.<\/div><\/div>\n<div class=\"a-part\">유형 2 · 어법 오류 수정<\/div>\n<div class=\"a\"><span class=\"num\">5.<\/span> consume → <span class=\"sol\"><b>consumed<\/b><\/span><div class=\"point\">차는 &#x27;소비되는&#x27; 대상이라 수동태! be동사(is) 뒤에는 과거분사 consumed를 써야 해.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">6.<\/span> are used → <span class=\"sol\"><b>is used<\/b><\/span><div class=\"point\">that이 가리키는 선행사가 a tail(단수)이라 동사도 단수 is를 써! 균형 잡는 데 &#x27;쓰이는&#x27; 거라 수동태 is used.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">7.<\/span> celebrating → <span class=\"sol\"><b>to celebrate<\/b><\/span><div class=\"point\">&#x27;~하기 위해&#x27;라는 목적을 나타낼 땐 to부정사(to celebrate)를 써!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">8.<\/span> to swim → function wireWorkbook(){
  const root=document.querySelector('.wbwrap'); if(!root) return;
  const norm=(s)=>(s||'').replace(/\s+/g,' ').trim();
  const normText=(s)=>(s||'').toLowerCase().replace(/['’]/g,'').replace(/[^a-z0-9\s]/g,' ').replace(/\s+/g,' ').trim();
  function refresh(q){const zone=q.querySelector('.answer-zone');
    zone.classList.toggle('empty', zone.querySelectorAll('.chip').length===0);
    zone.classList.remove('correct','wrong');
    const v=q.querySelector('.verdict'); v.textContent=''; v.className='verdict';}
  function type1Correct(q){const got=norm([].map.call(q.querySelector('.answer-zone').querySelectorAll('.chip'),c=>c.textContent).join(' '));
    return got===norm(q.getAttribute('data-answer'));}
  let active=null;
  function afterElement(zone,x,y,skip){const els=[].slice.call(zone.querySelectorAll('.chip')).filter(c=>c!==skip);
    let best={dist:Infinity,el:null,before:true};
    els.forEach(el=>{const b=el.getBoundingClientRect();const cx=b.left+b.width/2,cy=b.top+b.height/2;
      const d=Math.abs(y-cy)*3+Math.abs(x-cx); if(d<best.dist)best={dist:d,el:el,before:(x<cx)};});
    return best;}
  function beginDrag(){const chip=active.chip,r=chip.getBoundingClientRect();const g=chip.cloneNode(true);
    g.className='chip ghost';g.style.width=r.width+'px';g.style.left=(r.left+r.width/2)+'px';g.style.top=(r.top+r.height/2)+'px';
    document.body.appendChild(g);active.ghost=g;active.dragging=true;chip.classList.add('dragging');}
  function moveGhost(x,y){const g=active.ghost;g.style.left=x+'px';g.style.top=y+'px';g.style.display='none';
    const under=document.elementFromPoint(x,y);g.style.display='';
    const zone=(under&&under.closest)?under.closest('.answer-zone,.bank'):null;
    if(zone&&zone.closest('.dnd')===active.q){const pos=afterElement(zone,x,y,active.chip);
      if(!pos.el)zone.appendChild(active.chip);else if(pos.before)zone.insertBefore(active.chip,pos.el);else zone.insertBefore(active.chip,pos.el.nextSibling);
      active.q.querySelectorAll('.answer-zone,.bank').forEach(z=>z.classList.toggle('over',z===zone));}}
  function onDown(e){if(e.button!==undefined&&e.button>0)return;const chip=e.currentTarget;
    active={chip,q:chip.closest('.dnd'),startX:e.clientX,startY:e.clientY,ghost:null,dragging:false,pid:e.pointerId};
    document.addEventListener('pointermove',onMove,{passive:false});document.addEventListener('pointerup',onUp);document.addEventListener('pointercancel',onUp);}
  function onMove(e){if(!active||(e.pointerId!==undefined&&e.pointerId!==active.pid))return;
    if(!active.dragging){if(Math.hypot(e.clientX-active.startX,e.clientY-active.startY)<8)return;beginDrag();}
    e.preventDefault();moveGhost(e.clientX,e.clientY);}
  function onUp(e){if(!active||(e.pointerId!==undefined&&e.pointerId!==active.pid))return;
    document.removeEventListener('pointermove',onMove,{passive:false});document.removeEventListener('pointerup',onUp);document.removeEventListener('pointercancel',onUp);
    const chip=active.chip,q=active.q;
    if(active.dragging){if(active.ghost)active.ghost.remove();chip.classList.remove('dragging');q.querySelectorAll('.over').forEach(z=>z.classList.remove('over'));}
    else{const zone=q.querySelector('.answer-zone'),bank=q.querySelector('.bank');(chip.parentElement===bank?zone:bank).appendChild(chip);}
    refresh(q);active=null;}
  root.querySelectorAll('.dnd').forEach(q=>{
    const bank=q.querySelector('.bank'),zone=q.querySelector('.answer-zone');let order=0;
    q.querySelectorAll('.chip').forEach(c=>{c.dataset.order=order++;c.addEventListener('pointerdown',onDown);});
    q.querySelector('.btn-check').addEventListener('click',()=>{
      const got=norm([].map.call(zone.querySelectorAll('.chip'),c=>c.textContent).join(' '));
      const ans=norm(q.getAttribute('data-answer')),trap=q.getAttribute('data-trap'),v=q.querySelector('.verdict');
      zone.classList.remove('correct','wrong');
      if(got===ans){zone.classList.add('correct');v.className='verdict ok';v.textContent='✅ 정답이에요! 완벽해요!';}
      else{zone.classList.add('wrong');v.className='verdict no';
        if(got==='')v.textContent='단어를 정답칸에 놓아 주세요!';
        else if(trap&&got.split(' ').indexOf(trap)>-1)v.textContent='⚠️ 함정 단어 "'+trap+'"가 들어 있어요. 빼고 다시!';
        else v.textContent='❌ 순서를 다시 확인해 보세요.';}});
    q.querySelector('.btn-reset').addEventListener('click',()=>{
      [].slice.call(q.querySelectorAll('.chip')).sort((a,b)=>a.dataset.order-b.dataset.order).forEach(c=>bank.appendChild(c));
      refresh(q);});
    refresh(q);
  });
  function iqCorrect(q){const got=normText(q.querySelector('.iq-input').value);if(!got)return null;
    return q.getAttribute('data-answer').split('|').map(normText).indexOf(got)>-1;}
  function showReveal(q){const r=q.querySelector('.reveal-ans');if(!r)return;
    const ex=q.getAttribute('data-example')||q.getAttribute('data-answer').split('|')[0];
    r.innerHTML='정답 예시: <b>'+esc(ex)+'</b>';r.classList.add('show');}
  function iqCheck(q){const inp=q.querySelector('.iq-input'),v=q.querySelector('.verdict'),res=iqCorrect(q);
    inp.classList.remove('ok','no');
    if(res===null){v.className='verdict no';v.textContent='답을 입력해 주세요!';return;}
    if(res){inp.classList.add('ok');v.className='verdict ok';v.textContent='✅ 정답!';}
    else{inp.classList.add('no');v.className='verdict no';v.textContent='❌ 다시 시도!';showReveal(q);}}
  root.querySelectorAll('.iq').forEach(q=>{const inp=q.querySelector('.iq-input');
    q.querySelector('.iq-check').addEventListener('click',()=>iqCheck(q));
    inp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();iqCheck(q);}});
    inp.addEventListener('input',()=>{inp.classList.remove('ok','no');const v=q.querySelector('.verdict');v.textContent='';v.className='verdict';});
    const rv=q.querySelector('.iq-reveal');if(rv)rv.addEventListener('click',()=>showReveal(q));});
  root.querySelector('.wb-gradeall').addEventListener('click',()=>{
    let correct=0,total=0,blank=0;
    root.querySelectorAll('.dnd').forEach(q=>{total++;const ok=type1Correct(q);
      const zone=q.querySelector('.answer-zone'),v=q.querySelector('.verdict');zone.classList.remove('correct','wrong');
      if(ok){correct++;zone.classList.add('correct');v.className='verdict ok';v.textContent='✅ 정답!';}
      else{zone.classList.add('wrong');v.className='verdict no';v.textContent='❌ 다시 확인';}});
    root.querySelectorAll('.iq').forEach(q=>{total++;const r=iqCorrect(q),inp=q.querySelector('.iq-input'),v=q.querySelector('.verdict');inp.classList.remove('ok','no');
      if(r===null){blank++;v.className='verdict no';v.textContent='미입력';}
      else if(r){correct++;inp.classList.add('ok');v.className='verdict ok';v.textContent='✅ 정답!';}
      else{inp.classList.add('no');v.className='verdict no';v.textContent='❌ 다시!';showReveal(q);}});
    const pct=Math.round(correct/total*100);
    let msg='📊 점수: <span class="big">'+correct+' / '+total+'</span> · '+pct+'점';
    if(blank>0)msg+=' (미입력 '+blank+')';
    msg+=pct===100?' 🎉 완벽해요!':(pct>=70?' 👍 잘했어요!':' 💪 다시 도전!');
    const box=root.querySelector('#scorebox');box.innerHTML=msg;box.classList.add('show');
    try{const s=SETS[state.setIdx];setBest(s.key,'workbook',pct);
      addHistory({date:todayStr(),pages:s.pages,topic:s.topic,mode:'workbook',modeName:'구문·어법 워크북',score:correct,total,pct,retry:false});
      gam_record({kind:'workbook',setKey:s.key,pages:s.pages,topic:s.topic,results:[],score:correct,total});}catch(_){}
    box.scrollIntoView({behavior:'smooth',block:'center'});});
  const tog=root.querySelector('.wb-toggle');
  tog.addEventListener('click',()=>{const a=root.querySelector('#answerSheet');
    a.classList.toggle('hide');tog.textContent=a.classList.contains('hide')?'정답·해설 보기':'정답·해설 숨기기';
    if(!a.classList.contains('hide'))a.scrollIntoView({behavior:'smooth'});});
}


/* ===== 게임화 · SRS (통합) ===== */
const SRS_IV=[0,1,2,4,8,16,32];
function gToday(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function gAddDays(n){const d=new Date();d.setDate(d.getDate()+n);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function srsUpdate(setKey,word,ok){const key=setKey+'::'+word;let e=store.srs[key]||{box:0,correct:0,wrong:0,last:'',next:''};
  if(ok){e.correct++;e.box=Math.min(e.box+1,6);}else{e.wrong++;e.box=Math.max(e.box-1,0);}
  e.last=gToday();e.next=gAddDays(ok?SRS_IV[e.box]:0);store.srs[key]=e;return e;}
function dueWords(){const out=[];const t=gToday();SETS.forEach(s=>s.words.forEach(w=>{const e=store.srs[s.key+'::'+w.w];if(e&&e.next<=t&&!isInstruction(w))out.push({s,w,e});}));return out;}
function masteryPct(setKey){const s=SETS.find(x=>x.key===setKey);if(!s)return 0;let m=0;s.words.forEach(w=>{const e=store.srs[setKey+'::'+w.w];if(e&&e.box>=3)m++;});return Math.round(m/s.words.length*100);}
function masteredCount(){let c=0;for(const k in store.srs){if(store.srs[k].box>=3)c++;}return c;}
function levelFor(xp){return Math.floor(Math.sqrt((xp||0)/40))+1;}
function xpInLevel(xp){xp=xp||0;const l=levelFor(xp);const base=40*(l-1)*(l-1);const next=40*l*l;return {l,cur:xp-base,need:next-base};}
function addXP(n){store.xp=(store.xp||0)+n;}
function touchStreak(){const t=gToday(),y=gAddDays(-1);if(store.streak.last===t)return false;
  if(store.streak.last===y)store.streak.count++;else store.streak.count=1;store.streak.last=t;return true;}
const BADGES=[
  {id:'first',e:'🌱',n:'첫걸음',d:'첫 학습 완료',c:s=>s.act>=1},
  {id:'perfect',e:'🏅',n:'만점왕',d:'첫 만점 달성',c:s=>s.perfect>=1},
  {id:'streak3',e:'🔥',n:'3일 연속',d:'3일 연속 학습',c:s=>store.streak.count>=3},
  {id:'streak7',e:'⚡',n:'일주일 개근',d:'7일 연속 학습',c:s=>store.streak.count>=7},
  {id:'m50',e:'📗',n:'50단어 마스터',d:'50단어 숙달',c:s=>masteredCount()>=50},
  {id:'m100',e:'📚',n:'100단어 마스터',d:'100단어 숙달',c:s=>masteredCount()>=100},
  {id:'m300',e:'🎓',n:'300단어 마스터',d:'300단어 숙달',c:s=>masteredCount()>=300},
  {id:'lv5',e:'⭐',n:'레벨 5',d:'레벨 5 달성',c:s=>levelFor(store.xp)>=5},
  {id:'wb',e:'✍️',n:'워크북 만점',d:'워크북 만점 달성',c:s=>s.wbPerfect>=1},
  {id:'chal',e:'🏆',n:'챌린저',d:'데일리 챌린지 완료',c:s=>s.challenge>=1},
];
function checkBadges(){const nu=[];const st=store.counts;BADGES.forEach(b=>{if(store.badges.indexOf(b.id)<0&&b.c(st)){store.badges.push(b.id);nu.push(b);}});return nu;}
function gam_record(o){
  store.counts=store.counts||{act:0,perfect:0,wbPerfect:0,challenge:0};
  store.counts.act++;let gained=0;
  (o.results||[]).forEach(r=>{srsUpdate(o.setKey,r.w,r.ok);gained+=r.ok?2:0;});
  if(o.kind==='workbook'){gained+=o.score*2;if(o.total>0&&o.score===o.total)store.counts.wbPerfect++;}
  if(o.kind==='challenge'){store.counts.challenge++;gained+=o.score*3;}
  const perfect=o.total>0&&o.score===o.total;if(perfect)store.counts.perfect++;
  const before=levelFor(store.xp);addXP(gained);const after=levelFor(store.xp);
  const newStreak=touchStreak();const nb=checkBadges();saveStore();
  gamFX({xp:gained,levelUp:after>before?after:0,perfect,badges:nb,streak:newStreak?store.streak.count:0});
}
function gamFX(fx){setTimeout(()=>{
  if(fx.perfect){confetti();playSound('perfect');}
  if(fx.levelUp){confetti();showToast('🎉 레벨 업! Lv.'+fx.levelUp+' 달성!');playSound('level');}

/* ---- 음성 인식 ---- */
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let recog=null, recording=false;
function srSupported(){return !!SR;}

/* 영어 채점 */
function normEn(s){return (s||"").toLowerCase().replace(/[^a-z ]/g,"").trim();}
function lev(a,b){const m=a.length,n=b.length;if(!m)return n;if(!n)return m;
  const d=Array.from({length:m+1},(_,i)=>[i,...Array(n).fill(0)]);
  for(let j=1;j<=n;j++)d[0][j]=j;
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)d[i][j]=Math.min(d[i-1][j]+1,d[i][j-1]+1,d[i-1][j-1]+(a[i-1]===b[j-1]?0:1));
  return d[m][n];}
// 영국식/미국식 철자 차이는 정답으로 인정 (예: recognise=recognize)
function ukUs(a,b){
  const f=(x)=>x.replace(/ise$/,"ize").replace(/isation$/,"ization")
    .replace(/our$/,"or").replace(/re$/,"er").replace(/ll/g,"l").replace(/ae|oe/g,"e");
  return f(a)===f(b);
}
// typed=true 이면 철자를 정확히 요구(오타 불인정), 음성이면 근접 발음 허용
function matchEn(target,heardList,typed){
  const tgt=normEn(target);
  for(const h of heardList){
    const hh=normEn(h); if(!hh) continue;
    if(hh===tgt) return {ok:true,heard:h};                 // 정확 일치
    if(ukUs(hh,tgt)) return {ok:true,heard:h};             // 영/미 철자 차이만 허용
    if(typed) continue;                                    // 타이핑은 여기까지(오타 불인정)
    // ↓ 음성 인식일 때만: 여러 단어로 들리거나 발음이 근접하면 허용
    if(hh.split(" ").includes(tgt)) return {ok:true,heard:h};
    const dist=lev(tgt,hh.replace(/ /g,""));
    const tol = tgt.length>=8 ? 1 : (tgt.length>=5 ? 1 : 0); // 훨씬 엄격하게
    if(tol>0 && dist<=tol) return {ok:true,heard:h};
  }
  return {ok:false,heard:heardList[0]||""};
}

/* 한글 채점 */
function normKo(s){return (s||"").replace(/\([^)]*\)/g,"").replace(/~/g,"").replace(/[.\/·]/g," ").replace(/\s+/g,"").trim();}

/* 한글 자모 분해 기반 근접 판정 (음성 오인식 흡수: 움직임↔움직이 등) */
function decomposeKo(s){
  const CHO=['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
  const JUNG=['ㅏ','ㅐ','ㅑ','ㅒ','ㅓ','ㅔ','ㅕ','ㅖ','ㅗ','ㅘ','ㅙ','ㅚ','ㅛ','ㅜ','ㅝ','ㅞ','ㅟ','ㅠ','ㅡ','ㅢ','ㅣ'];
  const JONG=['','ㄱ','ㄲ','ㄳ','ㄴ','ㄵ','ㄶ','ㄷ','ㄹ','ㄺ','ㄻ','ㄼ','ㄽ','ㄾ','ㄿ','ㅀ','ㅁ','ㅂ','ㅄ','ㅅ','ㅆ','ㅇ','ㅈ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
  let out=[];
  for(const ch of s){
    const code=ch.charCodeAt(0)-0xAC00;
    if(code>=0 && code<11172){
      out.push(CHO[Math.floor(code/588)]);
      out.push(JUNG[Math.floor((code%588)/28)]);
      const j=code%28; if(j) out.push(JONG[j]);
    } else out.push(ch);
  }
  return out.join('');
}
function levStr(a,b){const m=a.length,n=b.length;if(!m)return n;if(!n)return m;
  const d=Array.from({length:m+1},(_,i)=>[i,...Array(n).fill(0)]);
  for(let j=1;j<=n;j++)d[0][j]=j;
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)d[i][j]=Math.min(d[i-1][j]+1,d[i][j-1]+1,d[i-1][j-1]+(a[i-1]===b[j-1]?0:1));
  return d[m][n];}
// 두 한글 단어가 발음상 거의 같은지 (끝소리 오인식만 인정, 앞부분 차이는 거부)
function koClose(a,b){
  if(!a||!b) return false;
  if(a===b) return true;
  // 짧은 단어(2글자 이하)는 자모가 적어 오탐 위험 → 근접 판정 안 함 (바다↔배, 얼↔열 차단)
  if(a.length<=2 || b.length<=2) return false;
  const da=decomposeKo(a), db=decomposeKo(b);
  if(Math.abs(da.length-db.length)>1) return false; // 길이 차 크면 다른 말
  const dist=levStr(da,db);
  if(dist>1) return false;                            // 자모 2개 이상 차이는 다른 말
  // 자모 1개 차이여도, 그 차이가 '앞쪽'이면 다른 단어(과학↔화학, 향상↔항상) → 거부
  const keep=Math.floor(Math.min(da.length,db.length)*0.6);
  if(keep>=1 && da.slice(0,keep)!==db.slice(0,keep)) return false;
  return true;

// 정규화된 그룹 (빠른 조회)
const SYN_GROUPS = SYNONYMS.map(g=>g.map(x=>normKo(x)).filter(Boolean));
// 형용사/동사 어간 추출 (거대한->거대, 줄이다->줄이, 영리한->영리)
function koStem(x){
  return x.replace(/(스러운|로운|러운|하는|되는|시키는|한|난|은|인|다|하다|되다|시키다|기)$/,"");
}
function synMatch(a,b){
  for(const g of SYN_GROUPS){ if(g.includes(a)&&g.includes(b)) return true; }
  // 어간 단위로도 그룹 대조 (활용형 흡수)
  const as=koStem(a), bs=koStem(b);
  if(as.length>=1 && bs.length>=1 && (as!==a || bs!==b)){
    for(const g of SYN_GROUPS){
      const stems=g.map(koStem);
      if(stems.includes(as)&&stems.includes(bs)) return true;
    }
  }
  return false;
}

function answerKeys(mean){
  const parts=mean.split(/[,、;；\/]/).map(p=>normKo(p)).filter(Boolean);
  const keys=new Set();
  parts.forEach(p=>{keys.add(p);
    const stem=p.replace(/(하다|되다|시키다|하는|되는|한|된|히|이다|다)$/,"");
    if(stem.length>=1)keys.add(stem);});
  return [...keys];
}
function matchKo(mean,heardList,word,spoken){
  // 이 단어가 여러 세트에서 가진 모든 뜻을 정답 키로 통합 (movement=움직임/운동 모두 인정)
  let keys=answerKeys(mean);
  const extra=allMeansFor(word);
  if(extra.length){
    const set=new Set(keys);
    extra.forEach(m=>answerKeys(m).forEach(k=>set.add(k)));
    keys=[...set];
  }
  // 종결 조사만 제거 (부사/형용사 파생 어미 '~하게/~적으로/~답게' 등은 남겨 품사 구분 유지)
  const stripJosa=(x)=>x.replace(/(습니다|ㅂ니다|입니다|이에요|예요|이요|이야|야|이다|요)$/,"");
  for(const raw of heardList){
    let h=normKo(raw); if(!h) continue;
    h=stripJosa(h);
    // 1) 정확 일치만 인정 (부분 포함 판정은 쓰지 않음 → 명사↔부사 오탐 차단)
    for(const k of keys){ if(h===k) return {ok:true,heard:raw}; }
    // 2) 등록된 유사어 그룹만 추가 인정 (활용형은 synMatch 내부 koStem이 흡수)
    for(const k of keys){ if(synMatch(h,k)) return {ok:true,heard:raw}; }
    // 3) 음성 입력일 때만: 자모 1개 차이(끝소리 오인식 등)는 정답 인정 (움직임↔움직이)
    if(spoken){
      for(const k of keys){ if(koClose(h,k)) return {ok:true,heard:raw}; }
      // 뒤에 딴말이 붙은 경우: 앞부분이 정답과 근접하면 인정 (움직이는것→움직임)
      // 단, 파생 어미(~답게/~하게/~적으로 등)가 붙은 건 품사가 달라지므로 제외
      const hasDeriv=/(답게|스럽게|롭게|하게|있게|적으로|적인|스러운|로운)/.test(h);
      if(!hasDeriv){
        for(const k of keys){
          if(k.length>=2 && h.length>k.length){
            const head=h.slice(0,k.length);
            if(koClose(head,k)) return {ok:true,heard:raw};
          }
        }
      }
    }
  }
  return {ok:false,heard:heardList[0]||""};
}

let exquiz=null;
// 시험 지시문 성격의 문장(예문이 아님)은 제외
function isInstruction(w){
  const ko=w.exKo||"", en=w.ex||"";
  if(/고르시오|고르세요|물음에 답|알맞은 것을|가장 적절한 것을|밑줄 친|빈칸에 들어갈/.test(ko)) return true;
  if(/^Choose |^Read the|^What is the (best )?(title|main)|for the passage/i.test(en)) return true;
  return false;
}
function blankExample(word, ex){
  if(!ex) return null;
  const w=(word||"").trim();
  if(w.includes(" ")||w.includes("~")){
    const core=w.replace(/~/g,"").trim();
    const re=new RegExp(core.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"),"i");
    if(re.test(ex)) return ex.replace(re,"______");
    return null;
  }
  let stem=w;
  if(/(e|y)$/.test(w)) stem=w.slice(0,-1);
  const re=new RegExp("\\b"+stem.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+"[a-z]{0,4}\\b","i");
  const m=ex.match(re);
  if(m) return ex.replace(m[0],"______");
  return null;
}
function startExQuiz(kind){
  const s=SETS[state.setIdx];
  // 지시문 성격 문장은 예문 시험에서 제외
  const valid=s.words.filter(w=>!isInstruction(w));
  let pool=valid.map(w=>({w, blank: blankExample(w.w, w.ex)}));
  if(kind==="exword") pool=pool.filter(x=>x.blank);
  else pool=pool.filter(x=>x.w.ex && x.w.exKo);
  pool=shuffle(pool);
  const qs=pool.map(x=>{
    let prompt, answer, options;
    if(kind==="exword"){
      prompt=x.blank; answer=x.w.w;
      const wrongs=shuffle(valid.filter(o=>o.w!==x.w.w)).slice(0,3).map(o=>o.w);
      options=shuffle([answer,...wrongs]);
    }else{
      prompt=x.w.ex; answer=x.w.exKo;
      // 오답 해석도 지시문이 아닌 실제 예문 해석에서만 뽑기 + 중복 방지
      const others=[...new Set(valid.filter(o=>o.exKo && o.exKo!==x.w.exKo).map(o=>o.exKo))];
      const wrongs=shuffle(others).slice(0,3);
      options=shuffle([answer,...wrongs]);
    }
    return {word:x.w, prompt, answer, options};
  });
  exquiz={kind, qs, i:0, picked:null, score:0, results:[], done:false, saved:false, showHint:false};
}

    if(exquiz.picked!==null){
      if(o===q.answer) cls+=" correct";
      else if(o===exquiz.picked) cls+=" wrong";
    }
    return `<button class="${cls}" data-exopt="${esc(o)}" ${exquiz.picked!==null?'disabled':''}>${esc(o)}</button>`;
  }).join("");
  const hint = kind==="exword"
    ? (exquiz.showHint
        ? `<div class="exhint">뜻 힌트: <b>${esc(q.word.mean)}</b></div>`
        : `<button class="hintbtn" data-exhint>💡 힌트 보기</button>`)
    : "";
  return `
    <header><button class="backbtn" data-modes>‹ 뒤로</button>
      <h1>${esc(s.pages)} · ${modeName}</h1>
      <div class="sub">${kind==="exword"?"빈칸에 알맞은 단어를 고르세요":"알맞은 해석을 고르세요"}</div></header>
    <div class="quiz">
      <div class="qcard">
        <div class="qprog">${exquiz.i+1} / ${exquiz.qs.length}</div>
        <div class="qbar"><i style="width:${pct}%"></i></div>
        <div class="exprompt ${kind==="exword"?"":"small"}">${esc(q.prompt)}</div>
        ${hint}
        <div class="exopts">${opts}</div>
        <button class="qnext" data-exnext ${exquiz.picked===null?'disabled':''}>${exquiz.i+1===exquiz.qs.length?'결과 보기':'다음 →'}</button>
      </div>
    </div>`;
}

function buildShareText(){
  const s=SETS[state.setIdx];
  const name=(store.name||"").trim();
  const who = name ? `${name} ` : "";
  // 예문 퀴즈 결과
  if(state.view==="exquiz" && exquiz){
    const total=exquiz.qs.length, score=exquiz.score, pct=Math.round(score/total*100);
    const emoji = pct===100?"🎉":pct>=70?"👏":"💪";
    const wrong=exquiz.results.filter(r=>r&&!r.ok).map(r=>r.word.w);
    let msg=`[영어 단어 시험 결과] ${emoji}\n${who}학생\n`;
    msg+=`· 범위: ${s.pages} ${s.topic}\n`;
    msg+=`· 유형: ${exquiz.kind==="exword"?"예문 빈칸(객관식)":"예문 해석(객관식)"}\n`;
    msg+=`· 점수: ${score} / ${total} (${pct}점)\n· 날짜: ${todayStr()}`;
    if(wrong.length) msg+=`\n· 틀린 단어: ${wrong.slice(0,10).join(", ")}${wrong.length>10?" 외":""}`;
    return msg;
  }
  if(!test) return "";
  const total=test.qs.length, score=test.results.filter(r=>r&&r.ok).length;
  const pct=Math.round(score/total*100);
  const emoji = pct===100?"🎉":pct>=70?"👏":"💪";
  const wrong=test.results.filter(r=>r&&!r.ok).map(r=>r.w.w);
  let msg=`[영어 단어 시험 결과] ${emoji}\n`;
  msg+=`${who}학생\n`;
  msg+=`· 범위: ${s.pages} ${s.topic}\n`;
  msg+=`· 유형: ${test.mode==="ko"?"뜻 말하기(영→한)":"단어 말하기(한→영)"}\n`;
  msg+=`· 점수: ${score} / ${total} (${pct}점)\n`;
  msg+=`· 날짜: ${todayStr()}`;
  if(wrong.length) msg+=`\n· 틀린 단어: ${wrong.slice(0,10).join(", ")}${wrong.length>10?" 외":""}`;
  return msg;
}
async function shareResult(){
  const text=buildShareText();
  if(!text) return;
  // 1) 폰 기본 공유창 (카톡·문자 등 선택)
  if(navigator.share){
    try{ await navigator.share({title:"영어 단어 시험 결과", text}); return; }
    catch(e){ if(e && e.name==="AbortError") return; /* 사용자가 취소 */ }
  }
  // 2) 클립보드 복사 폴백
  try{
    await navigator.clipboard.writeText(text);
    showToast("결과가 복사됐어요! 카톡·문자에 붙여넣어 보내세요.");
    return;
  }catch(_){}
  // 3) 최후: 텍스트 보여주고 직접 복사
  showShareModal(text);
}
function showToast(msg){
  let t=document.getElementById("toast");
  if(!t){ t=document.createElement("div"); t.id="toast"; t.className="toast"; document.body.appendChild(t); }
  t.textContent=msg; t.classList.add("show");
  clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove("show"), 2600);
}
function showShareModal(text){
  let m=document.getElementById("sharemodal");
  if(m) m.remove();
  m=document.createElement("div"); m.id="sharemodal"; m.className="modal";
  m.innerHTML=`<div class="modalbox">
    <div class="modaltitle">부모님께 보낼 내용</div>
    <textarea class="modalta" readonly>${esc(text)}</textarea>
    <div class="modalhint">아래 내용을 길게 눌러 복사한 뒤 카톡·문자로 보내세요.</div>
    <button class="stbtn solid" id="modalclose" style="width:100%;">닫기</button>
  </div>`;
  document.body.appendChild(m);
  m.querySelector("#modalclose").onclick=()=>m.remove();
  m.onclick=(e)=>{ if(e.target===m) m.remove(); };
  const ta=m.querySelector(".modalta"); ta.focus(); ta.select();
}

function startTest(mode, wordList){
  const s=SETS[state.setIdx];
  const pool = (wordList && wordList.length) ? wordList : s.words;
  test={mode, qs:shuffle(pool), i:0, results:[], phase:"ready", heard:"", ok:null, retryWrong:!!wordList};
}

      <div class="ordiv"><span>또는 직접 입력</span></div>
      <div class="typerow">
        <input class="typein" id="typein" type="text" autocomplete="off" autocapitalize="off" autocorrect="off"
          inputmode="${isKo?'text':'latin'}" placeholder="${isKo?'한글 뜻을 입력':'영어 단어를 입력'}" />
        <button class="typebtn" data-submit>제출</button>
      </div>`;
  } else if(test.phase==="recording"){
    feedback=`<button class="micbtn recording" data-mic><span>${ICON_MIC}</span></button>
      <div class="miclabel">🔴 듣고 있어요… 말한 뒤 잠시 기다리세요</div>`;
  } else if(test.phase==="error"){
    feedback=`
      <div class="micerror">${esc(test.errMsg||"인식에 실패했어요.").replace(/\n/g,"<br>")}</div>
      <div class="ordiv"><span>마이크 대신 직접 입력</span></div>
      <div class="typerow">
        <input class="typein" id="typein" type="text" autocomplete="off" autocapitalize="off" autocorrect="off"
          inputmode="${isKo?'text':'latin'}" placeholder="${isKo?'한글 뜻을 입력':'영어 단어를 입력'}" />
        <button class="typebtn" data-submit>제출</button>
      </div>
      <div class="stbtns" style="margin-top:12px;">
        <button class="stbtn ghost" data-mic>🎤 다시 시도</button>
        <button class="stbtn solid" data-skip2>이 문제 넘기기 →</button>
      </div>`;
  } else {
    feedback=`
      <div class="heard">내 답: <b>${esc(test.heard||"(입력 없음)")}</b></div>
      <div class="verdict ${test.ok?'ok':'no'}">${test.ok?'✓ 정답!':'✕ 다시 도전'}</div>
      <div class="answer">정답: <b>${esc(answerText)}</b></div>
      <div class="stbtns">
        <button class="stbtn ghost" data-mic>🎤 다시 말하기</button>
        <button class="stbtn solid" data-next>${test.i+1===test.qs.length?'결과 보기':'다음 →'}</button>
      </div>`;
  }
  const tip = isKo
    ? '💡 뜻이 여러 개면 하나만 말해도 정답이에요.'
    : '💡 발음이 조금 달라도 비슷하면 정답 처리돼요.';
  return `
    <header><button class="backbtn" data-modes>‹ 뒤로</button>
      <h1>${esc(s.pages)} · ${modeName}</h1>
      <div class="sub">${isKo?'영어 단어 → 한글 뜻 말하기':'한글 뜻 → 영어 단어 말하기'}</div></header>
    <div class="speak-test"><div class="stcard">
      <div class="stprog">${test.i+1} / ${test.qs.length}</div>
      <div class="stbar"><i style="width:${pct}%"></i></div>
      <div class="stq-label ${isKo?'e':'k'}">${isKo?'ENGLISH':'KOREAN'}</div>
      <div class="stprompt">${prompt}</div>
      <div class="stword ${isKo?'':'kor'}">${esc(showWord)}</div>
      <div class="stpos">${esc(q.pos)}</div>
      ${isKo?`<button class="stlisten" data-speak="${esc(q.w)}" data-lang="en">${ICON_SPK_SM} 단어 발음 듣기</button>`:''}
      ${feedback}
      ${(test.phase==="ready"||test.phase==="recording")?`<button class="skip" data-skip>모르겠어요 (넘기기)</button>`:''}
      ${test.phase==="ready"?`<div class="tip">${tip}</div>`:''}
    </div></div>`;
}

function micErrorMsg(err){
  switch(err){
    case "not-allowed":
    case "service-not-allowed":
      return "마이크 권한이 꺼져 있어요. 브라우저 주소창의 자물쇠(또는 ⋮ 메뉴)에서 마이크를 '허용'으로 바꿔 주세요.";
    case "no-speech":
      return "소리가 잘 안 들렸어요. 마이크 가까이에서 또박또박 말해 주세요.";
    case "audio-capture":
      return "마이크를 찾을 수 없어요. 다른 앱이 마이크를 쓰고 있지 않은지 확인해 주세요.";
    case "network":
      return "인터넷 연결을 확인해 주세요. (음성 인식은 인터넷이 필요해요.)";
    case "aborted":
      return "인식이 중단됐어요. 다시 눌러 주세요.";
    default:
      return "인식에 실패했어요. 다시 시도해 주세요.";
  }
}
function submitTyping(){
  const el=document.getElementById("typein");
  if(!el) return;
  const val=(el.value||"").trim();
  if(!val){ el.focus(); return; }
  const q=test.qs[test.i];
  const isKo=test.mode==="ko";
  const m = isKo ? matchKo(q.mean, [val], q.w, false) : matchEn(q.w, [val], true);
  test.heard=val; test.ok=m.ok; test.phase="result";
  render();
  if(m.ok) speak(q.w, null, "en");
}
function recordOnce(){
  if(recording)return;
  // 안전장치: 로컬 파일(file://)에서는 크롬이 마이크를 막음
  if(location.protocol==="file:"){
    test.phase="error";
    test.errMsg="⚠️ 파일을 직접 열면 마이크가 막혀요.\n\n해결법: 이 파일을 구글 드라이브에 올려 열거나, 학교/집 PC에서 열 때는 크롬 대신 '엣지(Edge)' 브라우저로 열어 보세요. 아이폰은 사파리에서 대체로 동작합니다.";
    render(); return;
  }
  const q=test.qs[test.i];
  const isKo=test.mode==="ko";
  try{ recog=new SR(); }
  catch(e){ test.phase="error"; test.errMsg="이 브라우저에서 음성 인식을 시작할 수 없어요. 크롬(안드로이드·PC) 또는 사파리(아이폰)에서 열어 주세요."; render(); return; }
  recog.lang = isKo ? "ko-KR" : "en-US";
  recog.interimResults=false; recog.maxAlternatives=5;
  recording=true; test.phase="recording"; test.errMsg=""; render();
  let got=false;
  recog.onresult=(e)=>{
    got=true;
    const alts=[];
    for(let i=0;i<e.results[0].length;i++)alts.push(e.results[0][i].transcript);
    const m = isKo ? matchKo(q.mean, alts, q.w, true) : matchEn(q.w, alts);
    test.heard=alts[0]; test.ok=m.ok; test.phase="result";
    recording=false; render();
    if(m.ok) speak(q.w, null, "en"); // 정답이면 영어 발음 들려주기
  };
  recog.onerror=(e)=>{
    recording=false;
    if(e.error==="no-speech"){
      // 말을 안 한 경우는 오답이 아니라 '다시 시도' 안내
      test.phase="error"; test.errMsg=micErrorMsg(e.error);
    } else {
      test.phase="error"; test.errMsg=micErrorMsg(e.error);
    }
    render();
  };
  recog.onend=()=>{ if(!got&&recording){recording=false; if(test.phase==="recording"){test.phase="error"; test.errMsg="소리가 인식되지 않았어요. 마이크를 누르고 다시 말해 주세요.";} render();} };
  try{recog.start();}
  catch(err){ recording=false; test.phase="error"; test.errMsg="마이크를 시작할 수 없어요. 잠시 후 다시 눌러 주세요."; render(); }
}

function bind(){
  const app=document.getElementById("app");
  app.onclick=(e)=>{
    const t=e.target.closest("[data-set],[data-home],[data-modes],[data-go],[data-test],[data-exquiz],[data-exopt],[data-exnext],[data-exretry],[data-exhint],[data-w],[data-speak],[data-mic],[data-submit],[data-next],[data-skip],[data-skip2],[data-retry],[data-retrywrong],[data-fav],[data-studyall],[data-studyfav],[data-share],[data-history],[data-setname],[data-workbook],[data-review],[data-challenge],[data-badges],[data-revshow],[data-revgrade],[data-chopt],[data-chnext],[data-mute]");
    if(!t)return;
    if(t.hasAttribute("data-speak")){ e.stopPropagation(); speak(t.getAttribute("data-speak"), t, t.getAttribute("data-lang")||"en"); return; }
    if(t.hasAttribute("data-exquiz")){ startExQuiz(t.getAttribute("data-exquiz")); state.view="exquiz"; scrollTo(0,0); render(); return; }
    if(t.hasAttribute("data-exopt")){
      if(exquiz.picked!==null) return;
      const pick=t.getAttribute("data-exopt"); const q=exquiz.qs[exquiz.i];
      exquiz.picked=pick; const ok=(pick===q.answer); if(ok)exquiz.score++;
      exquiz.results[exquiz.i]={word:q.word, ok};
      render();
      // 정답 여부와 상관없이 예문 전체를 읽어줌 (학습 강화)
      speak(q.word.ex, null, "en"); return;
    }
    if(t.hasAttribute("data-exhint")){ exquiz.showHint=true; render(); return; }
    if(t.hasAttribute("data-exnext")){
      if(exquiz.i+1>=exquiz.qs.length){ exquiz.done=true; }
      else { exquiz.i++; exquiz.picked=null; exquiz.showHint=false; }
      scrollTo(0,0); render(); return;
    }
    if(t.hasAttribute("data-exretry")){ startExQuiz(exquiz.kind); scrollTo(0,0); render(); return; }
    if(t.hasAttribute("data-fav")){ e.stopPropagation(); toggleFav(SETS[state.setIdx].key, t.getAttribute("data-fav")); render(); return; }
    if(t.hasAttribute("data-studyall")){ state.studyFav=false; render(); return; }
    if(t.hasAttribute("data-studyfav")){ state.studyFav=true; render(); return; }
    if(t.hasAttribute("data-submit")){ submitTyping(); return; }
    if(t.hasAttribute("data-set")){ state.setIdx=+t.getAttribute("data-set"); state.view="modes"; state.studyFav=false; test=null; scrollTo(0,0); render(); return; }
    if(t.hasAttribute("data-home")){ state.view="home"; test=null; abortRec(); scrollTo(0,0); render(); return; }
    if(t.hasAttribute("data-modes")){ state.view="modes"; test=null; abortRec(); scrollTo(0,0); render(); return; }
    if(t.hasAttribute("data-go")){ state.view=t.getAttribute("data-go"); scrollTo(0,0); render(); return; }
    if(t.hasAttribute("data-test")){ startTest(t.getAttribute("data-test")); state.view="test"; scrollTo(0,0); render(); return; }
    if(t.hasAttribute("data-w")){ t.classList.toggle("open"); return; }
    if(t.hasAttribute("data-mic")){ recordOnce(); return; }
    if(t.hasAttribute("data-skip")){ test.results[test.i]={w:test.qs[test.i],ok:false,heard:"(넘김)"}; advance(); return; }
    if(t.hasAttribute("data-skip2")){ test.results[test.i]={w:test.qs[test.i],ok:false,heard:"(넘김)"}; advance(); return; }
    if(t.hasAttribute("data-next")){ test.results[test.i]={w:test.qs[test.i],ok:!!test.ok,heard:test.heard||""}; advance(); return; }
    if(t.hasAttribute("data-retry")){ startTest(test.mode); scrollTo(0,0); render(); return; }
    if(t.hasAttribute("data-retrywrong")){ const wrong=test.results.filter(r=>r&&!r.ok).map(r=>r.w); startTest(test.mode, wrong); scrollTo(0,0); render(); return; }
    if(t.hasAttribute("data-share")){ shareResult(); return; }
    if(t.hasAttribute("data-history")){ state.view="history"; scrollTo(0,0); render(); return; }
    if(t.hasAttribute("data-workbook")){ state.view="workbook"; scrollTo(0,0); render(); return; }
    if(t.hasAttribute("data-review")){ startReview(); state.view="review"; scrollTo(0,0); render(); return; }
    if(t.hasAttribute("data-challenge")){ startChallenge(); state.view="challenge"; scrollTo(0,0); render(); return; }
    if(t.hasAttribute("data-badges")){ state.view="badges"; scrollTo(0,0); render(); return; }
    if(t.hasAttribute("data-revshow")){ review.show=true; render(); return; }
    if(t.hasAttribute("data-revgrade")){ reviewGrade(t.getAttribute("data-revgrade")==="1"); return; }
    if(t.hasAttribute("data-chopt")){ challengePick(t.getAttribute("data-chopt")); return; }
    if(t.hasAttribute("data-chnext")){ challengeNext(); return; }
    if(t.hasAttribute("data-mute")){ store.mute=!store.mute; saveStore(); render(); return; }
    if(t.hasAttribute("data-setname")){ askName(); return; }
  };
  // 타이핑 입력창: 엔터로 제출
  const typein=document.getElementById("typein");
  if(typein){
    typein.onkeydown=(e)=>{ if(e.key==="Enter"){ e.preventDefault(); submitTyping(); } };
  }
}
function abortRec(){ if(recog){try{recog.abort()}catch(_){}} recording=false; }
function advance(){
  if(test.i+1>=test.qs.length){ test.phase="done"; }
  else{ test.i++; test.phase="ready"; test.heard=""; test.ok=null; }
  scrollTo(0,0); render();
}
render();
</script>
</body>
</html>
