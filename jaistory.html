<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>중2 영어 단어장 · 말하기 시험</title>
<style>
  :root{
    --navy:#1F3864; --navy2:#2c4d84; --light:#EDF1F8; --accent:#C05A28;
    --ink:#1a2540; --sub:#5a6b8c; --line:#d5deee; --bg:#f2f5fb; --card:#fff;
    --good:#1f8a5b; --goodbg:#e7f6ee; --bad:#d9534f; --badbg:#fdecec;
    --eng:#1F3864; --kor:#8a4b16;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{font-family:"Apple SD Gothic Neo","맑은 고딕","Malgun Gothic",system-ui,sans-serif;
    background:var(--bg); color:var(--ink); min-height:100vh; overscroll-behavior:none;}
  .wrap{max-width:560px; margin:0 auto; padding:0 0 40px; min-height:100vh;}

  header{background:linear-gradient(135deg,var(--navy),var(--navy2)); color:#fff;
    padding:20px 20px 18px; position:sticky; top:0; z-index:20; box-shadow:0 2px 14px rgba(31,56,100,.25);}
  header h1{margin:0; font-size:20px; font-weight:800; letter-spacing:-.3px; display:flex; align-items:center; gap:8px;}
  header .sub{margin-top:4px; font-size:12.5px; color:#c9d6ef; font-weight:500;}
  .backbtn{background:rgba(255,255,255,.15); border:none; color:#fff; font-size:14px;
    padding:7px 13px; border-radius:20px; font-weight:700; cursor:pointer; margin-bottom:10px;}
  .backbtn:active{background:rgba(255,255,255,.28);}

  .setgrid{padding:16px; display:grid; grid-template-columns:1fr 1fr; gap:11px;}
  .setcard{background:var(--card); border:1px solid var(--line); border-radius:15px; padding:15px 14px;
    cursor:pointer; transition:transform .12s; display:flex; flex-direction:column; gap:6px; position:relative; overflow:hidden;}
  .setcard:active{transform:scale(.97);}
  .setcard .pg{font-size:12px; font-weight:800; color:var(--navy);}
  .setcard .tp{font-size:13.5px; font-weight:700; line-height:1.35; min-height:36px;}
  .setcard .cnt{font-size:11.5px; color:var(--sub); font-weight:600; display:flex; flex-wrap:wrap; gap:4px; align-items:center;}
  .badge-best{background:#e7f0ff; color:var(--navy); font-weight:800; font-size:10px; padding:1px 6px; border-radius:5px;}
  .badge-fav{background:#fff3d6; color:#a8730a; font-weight:800; font-size:10px; padding:1px 6px; border-radius:5px;}
  .star{width:38px; height:44px; border:none; background:none; color:#e0b100; font-size:23px; cursor:pointer; flex-shrink:0; line-height:1; padding:0;}
  .star:not(.on){color:#c7cede;}
  .star:active{transform:scale(.85);}
  .star.sm{width:30px; height:30px; font-size:18px;}
  .studybar{display:flex; gap:8px; padding:2px 2px 12px;}
  .emptyfav{text-align:center; color:var(--sub); font-size:13.5px; line-height:1.7; padding:50px 20px;}
  .chip{border:1px solid var(--line); background:#fff; color:var(--navy); font-size:12.5px; font-weight:700; padding:8px 14px; border-radius:20px; cursor:pointer;}
  .chip.on{background:var(--navy); color:#fff; border-color:var(--navy);}
  .chip:active{transform:scale(.96);}
  .bestline{font-size:13px; color:var(--sub); margin-top:10px; font-weight:600;}
  .bestline b{color:var(--navy);}
  .mbest{display:inline-block; margin-left:6px; font-size:11px; font-weight:800; color:#a8730a; background:#fff3d6; padding:2px 7px; border-radius:6px; vertical-align:middle;}
  .stbtn.send{background:linear-gradient(135deg,#1f8a5b,#26a56b); color:#fff;}
  .homehead{display:flex; align-items:center; justify-content:space-between; gap:10px;}
  .histbtn{background:rgba(255,255,255,.16); border:none; color:#fff; font-size:12.5px; font-weight:800;
    padding:8px 12px; border-radius:20px; cursor:pointer; flex-shrink:0;}
  .histbtn:active{background:rgba(255,255,255,.28);}
  .namebar{display:flex; align-items:center; justify-content:space-between; gap:10px; background:#fff;
    border:1px solid var(--line); border-radius:12px; padding:12px 14px; margin-bottom:12px; font-size:13px; color:var(--sub);}
  .namebar b{color:var(--ink);}
  .hrow{display:flex; align-items:center; justify-content:space-between; gap:12px; background:#fff;
    border:1px solid var(--line); border-radius:12px; padding:13px 15px; margin-bottom:9px;}
  .hpages{font-size:14px; font-weight:800; color:var(--ink);}
  .htopic{font-size:12px; font-weight:600; color:var(--sub); margin-left:4px;}
  .hmeta{font-size:11.5px; color:var(--sub); margin-top:3px;}
  .hscore{font-size:17px; font-weight:800; text-align:right; flex-shrink:0;}
  .hscore span{display:block; font-size:11px; font-weight:700;}
  .hscore.good{color:var(--good);} .hscore.low{color:#c96a2e;}
  .toast{position:fixed; left:50%; bottom:32px; transform:translateX(-50%) translateY(20px);
    background:#222c44; color:#fff; font-size:13.5px; font-weight:600; padding:13px 18px; border-radius:12px;
    max-width:88%; text-align:center; opacity:0; pointer-events:none; transition:.28s; z-index:100; line-height:1.5;}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
  .modal{position:fixed; inset:0; background:rgba(20,30,55,.55); display:flex; align-items:center;
    justify-content:center; padding:22px; z-index:120;}
  .modalbox{background:#fff; border-radius:18px; padding:20px; width:100%; max-width:420px;}
  .modaltitle{font-size:16px; font-weight:800; color:var(--navy); margin-bottom:12px;}
  .modalta{width:100%; height:150px; border:1.5px solid var(--line); border-radius:12px; padding:12px;
    font-size:14px; font-family:inherit; line-height:1.6; color:var(--ink); resize:none; margin-bottom:8px;}
  .modalhint{font-size:12px; color:var(--sub); margin-bottom:14px; line-height:1.5;}
  .setcard .bar{position:absolute; left:0; top:0; bottom:0; width:5px; background:var(--navy);}

  .intro{padding:18px 18px 4px;}
  .intro h2{margin:0 0 5px; font-size:16px; color:var(--navy);}
  .intro p{margin:0; font-size:13px; color:var(--sub); line-height:1.6;}

  .modes{padding:16px; display:flex; flex-direction:column; gap:12px;}
  .modecard{background:var(--card); border:1px solid var(--line); border-radius:16px; padding:18px;
    cursor:pointer; display:flex; align-items:center; gap:14px;}
  .modecard:active{transform:scale(.98);}
  .modeicon{width:48px; height:48px; border-radius:13px; background:var(--light); color:var(--navy);
    display:flex; align-items:center; justify-content:center; flex-shrink:0;}
  .modeicon svg{width:26px; height:26px;}
  .modeicon.kor{background:#f6ece1; color:var(--kor);}
  .modeicon.quiz{background:#e6f0ea; color:#1f8a5b;}
  .badge.q{background:#e0f0e8; color:#1f8a5b;}
  .quiz{padding:20px 18px 40px;}
  .qcard{background:#fff; border:1px solid var(--line); border-radius:20px; padding:24px 20px; box-shadow:0 2px 12px rgba(31,56,100,.07);}
  .qprog{font-size:12.5px; color:var(--sub); font-weight:700; margin-bottom:8px; text-align:center;}
  .qbar{height:6px; background:var(--light); border-radius:4px; overflow:hidden; margin-bottom:20px;}
  .qbar > i{display:block; height:100%; background:#1f8a5b; transition:width .3s;}
  .exprompt{font-size:20px; font-weight:700; line-height:1.5; color:var(--ink); text-align:center; margin-bottom:8px; word-break:keep-all;}
  .exprompt.small{font-size:17px; font-weight:600;}
  .exhint{text-align:center; font-size:13px; color:var(--sub); margin-bottom:16px;}
  .exhint b{color:var(--navy);}
  .hintbtn{display:block; margin:0 auto 16px; background:#fff7e6; border:1px solid #ffe0a3; color:#9a6a00;
    font-size:13.5px; font-weight:700; padding:9px 18px; border-radius:20px; cursor:pointer;}
  .hintbtn:active{background:#ffefcc;}
  .stlisten{display:block; margin:0 auto 14px; background:none; border:none; color:var(--navy2); font-size:13px; font-weight:700; cursor:pointer;}
  .exopts{display:flex; flex-direction:column; gap:10px; margin-top:8px;}
  .exopt{border:1.5px solid var(--line); background:#fff; border-radius:13px; padding:15px; font-size:15.5px; font-weight:700; color:var(--ink); cursor:pointer; text-align:center; transition:.12s; word-break:keep-all; line-height:1.4;}
  .exopt:active{transform:scale(.98);}
  .exopt.correct{background:#e7f6ee; border-color:var(--good); color:var(--good);}
  .exopt.wrong{background:#fdecec; border-color:var(--bad); color:var(--bad);}
  .qnext{margin-top:16px; width:100%; padding:15px; border:none; border-radius:13px; background:var(--navy); color:#fff; font-size:15px; font-weight:800; cursor:pointer;}
  .qnext:disabled{opacity:.4;}
  .modecard h3{margin:0 0 3px; font-size:16px;}
  .modecard p{margin:0; font-size:12.5px; color:var(--sub); line-height:1.45;}
  .badge{display:inline-block; font-size:10.5px; font-weight:800; padding:2px 7px; border-radius:6px; margin-left:6px; vertical-align:middle;}
  .badge.e{background:#e6edfa; color:var(--navy);}
  .badge.k{background:#f6ece1; color:var(--kor);}

  .list{padding:14px 14px 0;}
  .word{background:var(--card); border:1px solid var(--line); border-radius:16px; margin-bottom:11px; overflow:hidden;}
  .word .top{display:flex; align-items:center; gap:12px; padding:15px 16px; cursor:pointer;}
  .word .num{min-width:30px; height:30px; border-radius:9px; background:var(--light); color:var(--navy);
    font-weight:800; font-size:13px; display:flex; align-items:center; justify-content:center; flex-shrink:0;}
  .word .main{flex:1; min-width:0;}
  .word .en{font-size:19px; font-weight:800; display:flex; align-items:baseline; gap:8px; flex-wrap:wrap;}
  .word .pos{font-size:11.5px; color:var(--sub); font-weight:700; background:#eef2f9; padding:2px 7px; border-radius:6px;}
  .word .ko{font-size:14.5px; color:var(--navy); font-weight:700; margin-top:3px;}
  .speak{width:44px; height:44px; border-radius:50%; border:none; flex-shrink:0;
    background:linear-gradient(135deg,var(--navy),var(--navy2)); color:#fff;
    display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow:0 3px 10px rgba(31,56,100,.3);}
  .speak:active{transform:scale(.88);}
  .speak.playing{animation:pulse .7s infinite;}
  @keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.12);}}
  .speak svg{width:22px; height:22px;}
  .word .ex{padding:0 16px 15px 58px; border-top:1px solid var(--line); display:none;}
  .word.open .ex{display:block; padding-top:12px;}
  .word .exrow{display:flex; align-items:flex-start; gap:9px; margin-top:9px;}
  .word .exen{font-size:14px; line-height:1.5; flex:1;}
  .word .exko{font-size:12.5px; line-height:1.5; color:var(--sub); margin-top:3px;}
  .exspeak{width:32px; height:32px; border-radius:50%; border:1px solid var(--line); background:#fff;
    color:var(--navy); display:flex; align-items:center; justify-content:center; flex-shrink:0; cursor:pointer;}
  .exspeak svg{width:15px; height:15px;}
  .exspeak.playing{background:var(--navy); color:#fff; animation:pulse .7s infinite;}

  .speak-test{padding:20px 18px 40px;}
  .stcard{background:#fff; border:1px solid var(--line); border-radius:20px; padding:28px 22px; text-align:center;
    box-shadow:0 2px 12px rgba(31,56,100,.07);}
  .stprog{font-size:12.5px; color:var(--sub); font-weight:700; margin-bottom:6px;}
  .stbar{height:6px; background:var(--light); border-radius:4px; overflow:hidden; margin-bottom:22px;}
  .stbar > i{display:block; height:100%; background:var(--navy); transition:width .3s;}
  .stq-label{font-size:12px; font-weight:800; letter-spacing:.3px; padding:3px 10px; border-radius:20px; display:inline-block; margin-bottom:12px;}
  .stq-label.e{background:#e6edfa; color:var(--navy);}
  .stq-label.k{background:#f6ece1; color:var(--kor);}
  .stprompt{font-size:15px; color:var(--sub); font-weight:600; margin-bottom:4px;}
  .stword{font-size:34px; font-weight:800; letter-spacing:-.5px; margin-bottom:4px; word-break:break-word; line-height:1.2;}
  .stword.kor{color:var(--kor);}
  .stpos{font-size:12px; color:var(--sub); font-weight:700; margin-bottom:8px;}
  .stlisten{background:none; border:none; color:var(--navy2); font-size:13px; font-weight:700; cursor:pointer;
    display:inline-flex; align-items:center; gap:5px; margin-bottom:22px;}
  .stlisten svg{width:15px;height:15px;}

  .micbtn{width:96px; height:96px; border-radius:50%; border:none; margin:0 auto 14px; display:block;
    background:linear-gradient(135deg,var(--navy),var(--navy2)); color:#fff; cursor:pointer;
    box-shadow:0 6px 20px rgba(31,56,100,.35); transition:transform .1s;}
  .micbtn:active{transform:scale(.93);}
  .micbtn svg{width:42px; height:42px;}
  .micbtn.recording{background:linear-gradient(135deg,#d9534f,#e5695f); animation:mic 1.1s infinite;}
  @keyframes mic{0%,100%{box-shadow:0 6px 20px rgba(217,83,79,.4);}50%{box-shadow:0 6px 30px rgba(217,83,79,.75);}}
  .miclabel{font-size:13px; color:var(--sub); font-weight:600; min-height:20px; margin-bottom:14px;}
  .micerror{background:#fff4e6; border:1px solid #ffd9a8; color:#9a5b00; border-radius:12px;
    padding:14px 16px; font-size:13.5px; line-height:1.6; margin-bottom:16px; text-align:left;}
  .ordiv{display:flex; align-items:center; gap:10px; margin:6px 0 12px; color:var(--sub); font-size:12px; font-weight:600;}
  .ordiv::before,.ordiv::after{content:""; flex:1; height:1px; background:var(--line);}
  .typerow{display:flex; gap:8px;}
  .typein{flex:1; border:1.5px solid var(--line); border-radius:12px; padding:14px 14px; font-size:16px;
    font-family:inherit; color:var(--ink); outline:none; min-width:0;}
  .typein:focus{border-color:var(--navy);}
  .typebtn{border:none; border-radius:12px; padding:0 20px; background:var(--navy); color:#fff;
    font-size:15px; font-weight:800; cursor:pointer; flex-shrink:0;}
  .typebtn:active{transform:scale(.97);}

  .heard{font-size:13px; color:var(--sub); margin-bottom:10px; min-height:18px;}
  .heard b{color:var(--ink);}
  .verdict{font-size:20px; font-weight:800; margin-bottom:6px; min-height:26px;}
  .verdict.ok{color:var(--good);} .verdict.no{color:var(--bad);}
  .answer{font-size:13px; color:var(--sub); margin-bottom:16px;}
  .answer b{color:var(--ink);}

  .stbtns{display:flex; gap:10px;}
  .stbtn{flex:1; padding:14px; border:none; border-radius:13px; font-size:15px; font-weight:800; cursor:pointer;}
  .stbtn.ghost{background:#fff; border:1.5px solid var(--line); color:var(--navy);}
  .stbtn.solid{background:var(--navy); color:#fff;}
  .stbtn:active{transform:scale(.98);}

  .stresult{text-align:center; padding:20px 4px;}
  .stresult .score{font-size:46px; font-weight:800; color:var(--navy);}
  .stresult .lbl{font-size:14px; color:var(--sub); margin-top:6px;}
  .review{margin-top:22px; text-align:left;}
  .review h4{font-size:13px; color:var(--sub); margin:0 0 8px;}
  .rvrow{display:flex; align-items:center; gap:10px; padding:11px 13px; background:#fff; border:1px solid var(--line);
    border-radius:11px; margin-bottom:7px;}
  .rvrow .rok{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:800;flex-shrink:0;}
  .rvrow.ok .rok{background:var(--good);} .rvrow.no .rok{background:var(--bad);}
  .rvrow .rw{flex:1; min-width:0;}
  .rvrow .rw b{font-weight:800; font-size:14.5px;}
  .rvrow .rw span{display:block; font-size:12.5px; color:var(--sub);}
  .rvrow .rspk{width:30px;height:30px;border-radius:50%;border:1px solid var(--line);background:#fff;color:var(--navy);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
  .rvrow .rspk svg{width:14px;height:14px;}

  .notice{background:#fff4e6; border:1px solid #ffd9a8; color:#9a5b00; border-radius:12px;
    padding:14px 16px; font-size:13px; line-height:1.6; margin:16px 0;}
  .skip{background:none;border:none;color:var(--sub);font-size:13px;font-weight:700;cursor:pointer;text-decoration:underline;margin-top:14px;}
  .tip{font-size:11.5px; color:var(--sub); margin-top:14px; line-height:1.5;}

/* ===== 워크북(스코프) ===== */
.wbwrap{
    --ink:#1a1a1a; --muted:#666; --line:#d9d9d9; --soft:#f4f4f2;
    --accent:#2f6f4e; --accent-soft:#e7f1ea; --warn:#b45309; --warn-soft:#fdf1e3;
    --blank:#9aa0a6;
  }
.wbwrap *{box-sizing:border-box;}
.wbwrap{-webkit-print-color-adjust:exact; print-color-adjust:exact;}
.wbwrap{
    font-family:"Malgun Gothic","맑은 고딕",system-ui,"Segoe UI",sans-serif;
    color:var(--ink); line-height:1.6; margin:0; background:#ececea;
    font-size:15px;
  }
.wbwrap .sheet{
    max-width:820px; margin:24px auto; background:#fff; padding:38px 44px;
    box-shadow:0 2px 14px rgba(0,0,0,.08); border-radius:4px;
  }
.wbwrap .book{font-size:12px; color:var(--muted); letter-spacing:.3px;}
.wbwrap h1{font-size:23px; margin:4px 0 2px; letter-spacing:-.3px;}
.wbwrap .sub{font-size:13px; color:var(--accent); font-weight:700; margin-bottom:14px;}
.wbwrap .meta{
    display:flex; gap:0; border:1px solid var(--line); border-radius:6px;
    overflow:hidden; margin:14px 0 6px; font-size:13px;
  }
.wbwrap .meta div{flex:1; padding:8px 12px; border-right:1px solid var(--line);}
.wbwrap .meta div:last-child{border-right:none;}
.wbwrap .meta b{color:var(--muted); font-weight:600; margin-right:8px;}
.wbwrap .tip{
    font-size:12.5px; color:var(--muted); background:var(--soft);
    border-radius:6px; padding:9px 13px; margin:12px 0 0;
  }
.wbwrap .part{margin-top:30px;}
.wbwrap .part-h{
    display:flex; align-items:center; gap:10px;
    border-bottom:2px solid var(--accent); padding-bottom:6px; margin-bottom:4px;
  }
.wbwrap .badge{
    background:var(--accent); color:#fff; font-size:13px; font-weight:700;
    padding:3px 11px; border-radius:20px; white-space:nowrap;
  }
.wbwrap .part-h h2{font-size:17px; margin:0;}
.wbwrap .howto{font-size:12.5px; color:var(--muted); margin:6px 0 14px;}
.wbwrap .q{margin:0 0 17px; padding-left:2px; page-break-inside:avoid;}
.wbwrap .q .num{font-weight:700; color:var(--accent); margin-right:6px;}
.wbwrap .ko{color:#333;}
.wbwrap .cond{font-size:12.5px; color:var(--muted);}
.wbwrap .chip{
    display:inline-block; font-family:"Consolas",monospace; font-size:13.5px;
    background:var(--soft); border:1px solid var(--line); border-radius:5px;
    padding:2px 9px; margin:4px 5px 0 0;
  }
.wbwrap .chip.trap-note{border-style:dashed;}
.wbwrap .tokens{margin-top:6px;}
.wbwrap .given{
    font-family:"Consolas",monospace; background:var(--accent-soft);
    border-radius:4px; padding:1px 7px; font-weight:700; color:var(--accent);
  }
.wbwrap .u-line{
    border-bottom:1.4px solid var(--blank); min-height:1.6em; margin-top:8px;
  }
.wbwrap .u-line.short{display:inline-block; min-width:120px; border-bottom:1.4px solid var(--blank);}
.wbwrap .blank{
    display:inline-block; min-width:82px; border-bottom:1.4px solid var(--blank);
    text-align:center; margin:0 2px;
  }
.wbwrap .underline{border-bottom:1.4px solid var(--ink); font-weight:600;}
.wbwrap .warn-tag{
    font-size:11px; font-weight:700; color:var(--warn); background:var(--warn-soft);
    border:1px solid #f0d9b8; border-radius:4px; padding:1px 7px; margin-left:6px;
  }
.wbwrap .sent{margin-top:3px;}
.wbwrap .dnd .bank{margin-top:8px; display:flex; flex-wrap:wrap; gap:7px;}
.wbwrap .dnd .chip{cursor:grab; user-select:none; -webkit-user-select:none; touch-action:none;}
.wbwrap .dnd .chip:active{cursor:grabbing;}
.wbwrap .chip.dragging{opacity:.28;}
.wbwrap .chip.ghost{
    position:fixed; z-index:1000; margin:0; pointer-events:none;
    transform:translate(-50%,-50%); opacity:.96;
    background:#fff; border-color:var(--accent); color:var(--accent);
    box-shadow:0 8px 18px rgba(0,0,0,.28);
  }
.wbwrap .answer-zone{
    margin-top:8px; min-height:48px; border:1.8px dashed var(--accent);
    border-radius:9px; background:var(--accent-soft); padding:9px 11px;
    display:flex; flex-wrap:wrap; gap:7px; align-items:center;
  }
.wbwrap .answer-zone.empty::before{
    content:attr(data-ph); color:var(--blank); font-size:12.5px; font-style:italic;
  }

e\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"?\"> into a real life rescue. <span class=\"given\">( turn )<\/span><\/span><\/div><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<div class=\"q iq\" data-answer=\"got|gotten\"><div><span class=\"num\">12.<\/span> <span class=\"sent\">The boys had <input type=\"text\" class=\"iq-input inline\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"?\"> into difficulties in heavy surf. <span class=\"given\">( get )<\/span><\/span><\/div><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<\/div>\n<div class=\"part\">\n<div class=\"part-h\"><span class=\"badge\">유형 4<\/span><h2>조건부 부분 영작 (Sentence Completion)<\/h2><\/div>\n<div class=\"howto\">우리말 뜻과 <b>주어진 핵심 단어<\/b>를 반드시 활용하여 <b>영어 문장을 완성<\/b>하고 <b>확인<\/b>을 누르세요. (단어의 형태는 바꿔도 좋아요. 대소문자·마침표·쉼표는 채점에서 무시됩니다.)<\/div>\n<div class=\"q iq\" data-answer=\"The lifeguards didn&#x27;t even have to swim or get wet.|The lifeguards did not even have to swim or get wet.\" data-example=\"The lifeguards didn&#x27;t even have to swim or get wet.\"><div><span class=\"num\">13.<\/span><span class=\"ko\">안전 요원들은 헤엄치거나 젖을 필요조차 없었다.<\/span><\/div><div class=\"cond\">조건: <span class=\"chip\">have to<\/span><span class=\"chip\">swim<\/span><span class=\"chip\">get wet<\/span><\/div><input type=\"text\" class=\"iq-input full\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"영어 문장을 입력하세요\"><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><button type=\"button\" class=\"iq-reveal\">정답 예시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<div class=\"q iq\" data-answer=\"The boys held on to the rescue pod.|The boys held onto the rescue pod.\" data-example=\"The boys held on to the rescue pod.\"><div><span class=\"num\">14.<\/span><span class=\"ko\">소년들은 구조 포드를 꽉 붙잡았다.<\/span><\/div><div class=\"cond\">조건: <span class=\"chip\">hold on to<\/span><span class=\"chip\">rescue pod<\/span><\/div><input type=\"text\" class=\"iq-input full\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"영어 문장을 입력하세요\"><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><button type=\"button\" class=\"iq-reveal\">정답 예시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<div class=\"q iq\" data-answer=\"A normal rescue takes longer.|A normal rescue takes a little longer.\" data-example=\"A normal rescue takes longer.\"><div><span class=\"num\">15.<\/span><span class=\"ko\">일반적인 구조는 시간이 더 오래 걸린다.<\/span><\/div><div class=\"cond\">조건: <span class=\"chip\">normal rescue<\/span><span class=\"chip\">take<\/span><span class=\"chip\">longer<\/span><\/div><input type=\"text\" class=\"iq-input full\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"영어 문장을 입력하세요\"><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><button type=\"button\" class=\"iq-reveal\">정답 예시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<div class=\"q iq\" data-answer=\"Why Surfing Can Be Dangerous\" data-example=\"Why Surfing Can Be Dangerous\"><div><span class=\"num\">16.<\/span><span class=\"ko\">서핑이 위험할 수 있는 이유<\/span><\/div><div class=\"cond\">조건: <span class=\"chip\">why<\/span><span class=\"chip\">surfing<\/span><span class=\"chip\">dangerous<\/span><\/div><input type=\"text\" class=\"iq-input full\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"영어 문장을 입력하세요\"><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><button type=\"button\" class=\"iq-reveal\">정답 예시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<\/div>\n<div class=\"scorebox\" id=\"scorebox\"><\/div>\n<div class=\"wb-answers hide\" id=\"answerSheet\"><div class=\"a-h\">✅ 정답 및 해설<\/div>\n<div class=\"a-note\">pp.102~103 「드론 구조」 · 각 문제의 <b>출제 포인트<\/b>를 함께 읽으며 스스로 채점해 보세요!<\/div>\n<div class=\"a-part\">유형 1 · 어순 배열<\/div>\n<div class=\"a\"><span class=\"num\">1.<\/span> <span class=\"sol\"><b>A lifeguard was testing a drone nearby<\/b><\/span><div class=\"point\">과거 어느 순간에 &#x27;하고 있던&#x27; 일은 과거진행형 was + 동사ing로 써! test는 testing이 돼.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">2.<\/span> <span class=\"sol\"><b>Two teenage boys were trapped in a huge wave<\/b><\/span> &nbsp;<span style=\"color:var(--warn)\">(함정 단어: was ✗)<\/span><div class=\"point\">&#x27;갇혀진&#x27; 거니까 수동태 be + 과거분사(trapped)! 주어가 복수(boys)라 be동사는 was가 아니라 were야.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">3.<\/span> <span class=\"sol\"><b>It only took 70 seconds to fly the drone to the site<\/b><\/span><div class=\"point\">여기 to fly는 &#x27;~하는 데&#x27;라는 뜻의 to부정사! It ~ to fly 구조로 시간을 나타내.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">4.<\/span> <span class=\"sol\"><b>A normal way of rescue takes at least a few minutes longer<\/b><\/span><div class=\"point\">longer는 long의 비교급이야. &#x27;더 오래(길게)&#x27;라는 뜻으로 뒤에 딱 붙여 써!<\/div><\/div>\n<div class=\"a-part\">유형 2 · 어법 오류 수정<\/div>\n<div class=\"a\"><span class=\"num\">5.<\/span> manage → <span class=\"sol\"><b>managed<\/b><\/span><div class=\"point\">이미 일어난 과거 이야기라 manage를 과거형 managed로! manage to ~는 &#x27;간신히 ~하다&#x27;.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">6.<\/span> allow → <span class=\"sol\"><b>allowed<\/b><\/span><div class=\"point\">be동사(are) 뒤엔 과거분사가 와서 수동태가 돼. are allowed to ~는 &#x27;~하는 게 허용되다&#x27;야.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">7.<\/span> swimmed → <span class=\"sol\"><b>swam<\/b><\/span><div class=\"point\">swim은 불규칙 동사! 과거형은 swimmed가 아니라 swam이야.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">8.<\/span> were → <span class=\"sol\"><b>was<\/b><\/span><div class=\"point\">진짜 주어는 a lifeguard(단수)! &#x27;not a fisherman&#x27;에 속지 말고 was를 써.<\/div><\/div>\n<div class=\"a-part\">유형 3 · 빈칸 어형 변화<\/div>\n<div class=\"a\"><span class=\"num\">9.<\/span> control → <span class=\"sol\"><b>controlled<\/b><\/span><div class=\"point\">과거 일이니까 control을 과거형으로! l을 하나 더 붙여서 controlled가 돼.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">10.<\/span> drop → <span class=\"sol\"><b>dropped<\/b><\/span><div class=\"point\">drop처럼 &#x27;단모음+단자음&#x27;으로 끝나면 p를 한 번 더 쓰고 -ed! dropped.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">11.<\/span> turn → <span class=\"sol\"><b>turned<\/b><\/span><div class=\"point\">지나간 이야기라 turn을 turned로! turn into는 &#x27;~로 바뀌다&#x27;라는 뜻이야.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">12.<\/span> get → <span class=\"sol\"><b>got<\/b><\/span><div class=\"point\">had + 과거분사는 과거완료(더 이전의 일)! get의 과거분사는 got이야.<\/div><\/div>\n<div class=\"a-part\">유형 4 · 조건부 부분 영작<\/div>\n<div class=\"a\"><span class=\"num\">13.<\/span> <span class=\"sol\"><b>The lifeguards didn&#x27;t even have to swim or get wet.<\/b><\/span><div class=\"point\">didn&#x27;t have to ~는 &#x27;~할 필요가 없었다&#x27;! don&#x27;t have to는 금지가 아니라 &#x27;안 해도 됨&#x27;이야.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">14.<\/span> <span class=\"sol\"><b>The boys held on to the rescue pod.<\/b><\/span><div class=\"point\">hold의 과거형은 held! hold on to는 &#x27;~을 꽉 붙잡다&#x27;라는 표현이야.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">15.<\/span> <span class=\"sol\"><b>A normal rescue takes longer.<\/b><\/span><div class=\"point\">주어가 단수(A normal rescue)라 동사에 -s 붙여 takes! longer는 &#x27;더 오래&#x27;.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">16.<\/span> <span class=\"sol\"><b>Why Surfing Can Be Dangerous<\/b><\/span><div class=\"point\">조동사 can 뒤엔 항상 동사원형(be)! Surfing은 &#x27;서핑하는 것&#x27;이라는 동명사 주어야.<\/div><\/div>  sister offered <span class=\"underline\">giving<\/span> the younger sister all her marbles.<\/span><\/div><div class=\"iq-row\"><span class=\"cond\">→ 고친 표현:<\/span><input type=\"text\" class=\"iq-input\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"정답 입력\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<\/div>\n<div class=\"part\">\n<div class=\"part-h\"><span class=\"badge\">유형 3<\/span><h2>빈칸 어형 변화 (Word Form)<\/h2><\/div>\n<div class=\"howto\">괄호 안의 <b>기본형 단어를 문장에 맞게 알맞은 형태로 바꿔<\/b> 빈칸에 입력하고 <b>확인<\/b>을 누르세요.<\/div>\n<div class=\"q iq\" data-answer=\"built\"><div><span class=\"num\">9.<\/span> <span class=\"sent\">They <input type=\"text\" class=\"iq-input inline\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"?\"> all houses facing south. <span class=\"given\">( build )<\/span><\/span><\/div><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<div class=\"q iq\" data-answer=\"sunniest\"><div><span class=\"num\">10.<\/span> <span class=\"sent\">They built all houses facing south, the <input type=\"text\" class=\"iq-input inline\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"?\"> direction. <span class=\"given\">( sunny )<\/span><\/span><\/div><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<div class=\"q iq\" data-answer=\"came\"><div><span class=\"num\">11.<\/span> <span class=\"sent\">The Greeks <input type=\"text\" class=\"iq-input inline\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"?\"> up with the idea of using the sun&#x27;s energy. <span class=\"given\">( come )<\/span><\/span><\/div><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<div class=\"q iq\" data-answer=\"wondering\"><div><span class=\"num\">12.<\/span> <span class=\"sent\">She kept <input type=\"text\" class=\"iq-input inline\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"?\"> if her sister had hidden some tasty candies. <span class=\"given\">( wonder )<\/span><\/span><\/div><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<\/div>\n<div class=\"part\">\n<div class=\"part-h\"><span class=\"badge\">유형 4<\/span><h2>조건부 부분 영작 (Sentence Completion)<\/h2><\/div>\n<div class=\"howto\">우리말 뜻과 <b>주어진 핵심 단어<\/b>를 반드시 활용하여 <b>영어 문장을 완성<\/b>하고 <b>확인<\/b>을 누르세요. (단어의 형태는 바꿔도 좋아요. 대소문자·마침표·쉼표는 채점에서 무시됩니다.)<\/div>\n<div class=\"q iq\" data-answer=\"That night, the younger sister slept peacefully.|That night the younger sister slept peacefully.\" data-example=\"That night, the younger sister slept peacefully.\"><div><span class=\"num\">13.<\/span><span class=\"ko\">그날 밤, 동생은 평화롭게 잤다.<\/span><\/div><div class=\"cond\">조건: <span class=\"chip\">sleep<\/span><span class=\"chip\">peacefully<\/span><span class=\"chip\">that night<\/span><\/div><input type=\"text\" class=\"iq-input full\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"영어 문장을 입력하세요\"><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><button type=\"button\" class=\"iq-reveal\">정답 예시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<div class=\"q iq\" data-answer=\"All homes benefited from solar heating.|All the homes benefited from solar heating.\" data-example=\"All homes benefited from solar heating.\"><div><span class=\"num\">14.<\/span><span class=\"ko\">모든 집이 태양열 난방의 혜택을 받았다.<\/span><\/div><div class=\"cond\">조건: <span class=\"chip\">benefit from<\/span><span class=\"chip\">solar heating<\/span><\/div><input type=\"text\" class=\"iq-input full\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"영어 문장을 입력하세요\"><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><button type=\"button\" class=\"iq-reveal\">정답 예시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<div class=\"q iq\" data-answer=\"In contrast, the older sister couldn&#x27;t sleep.|In contrast, the older sister could not sleep.\" data-example=\"In contrast, the older sister couldn&#x27;t sleep.\"><div><span class=\"num\">15.<\/span><span class=\"ko\">그에 반해, 언니는 잠을 잘 수 없었다.<\/span><\/div><div class=\"cond\">조건: <span class=\"chip\">in contrast<\/span><span class=\"chip\">cannot<\/span><span class=\"chip\">sleep<\/span><\/div><input type=\"text\" class=\"iq-input full\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"영어 문장을 입력하세요\"><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><button type=\"button\" class=\"iq-reveal\">정답 예시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<div class=\"q iq\" data-answer=\"She offered to give all her marbles in exchange for all her sister&#x27;s candies.|She offered to give all her marbles in exchange for her sister&#x27;s candies.\" data-example=\"She offered to give all her marbles in exchange for all her sister&#x27;s candies.\"><div><span class=\"num\">16.<\/span><span class=\"ko\">그녀는 동생의 사탕 전부와 교환하여 자신의 구슬 전부를 주겠다고 제안했다.<\/span><\/div><div class=\"cond\">조건: <span class=\"chip\">offer<\/span><span class=\"chip\">give<\/span><span class=\"chip\">in exchange for<\/span><\/div><input type=\"text\" class=\"iq-input full\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"영어 문장을 입력하세요\"><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><button type=\"button\" class=\"iq-reveal\">정답 예시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<\/div>\n<div class=\"scorebox\" id=\"scorebox\"><\/div>\n<div class=\"wb-answers hide\" id=\"answerSheet\"><div class=\"a-h\">✅ 정답 및 해설<\/div>\n<div class=\"a-note\">pp.114~115 「독해 유형 완성 TEST」 · 각 문제의 <b>출제 포인트<\/b>를 함께 읽으며 스스로 채점해 보세요!<\/div>\n<div class=\"a-part\">유형 1 · 어순 배열<\/div>\n<div class=\"a\"><span class=\"num\">1.<\/span> <span class=\"sol\"><b>People have used sunlight throughout history<\/b><\/span><div class=\"point\">&#x27;~해 왔다&#x27;는 과거부터 지금까지 쭉이라 현재완료 have + p.p.(used)를 써!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">2.<\/span> <span class=\"sol\"><b>She kept the biggest and most beautiful marble<\/b><\/span> &nbsp;<span style=\"color:var(--warn)\">(함정 단어: more ✗)<\/span><div class=\"point\">&#x27;가장 ~한&#x27;은 최상급이라 biggest, most beautiful을 써. 함정인 more는 비교급이라 안 써!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">3.<\/span> <span class=\"sol\"><b>They used solar power to provide sunlight and heat<\/b><\/span><div class=\"point\">&#x27;~하기 위해&#x27;라는 목적은 to부정사(to provide)로 나타내!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">4.<\/span> <span class=\"sol\"><b>The Greeks came up with the idea of using the sun&#x27;s free energy<\/b><\/span><div class=\"point\">전치사 of 뒤에는 동사를 못 쓰니까 동명사(using)로 바꿔줘!<\/div><\/div>\n<div class=\"a-part\">유형 2 · 어법 오류 수정<\/div>\n<div class=\"a\"><span class=\"num\">5.<\/span> hid → <span class=\"sol\"><b>hidden<\/b><\/span><div class=\"point\">had 뒤에는 과거분사가 와야 해. hide는 hid-hidden이라 여기선 hidden!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">6.<\/span> Sunlight come → <span class=\"sol\"><b>Sunlight comes<\/b><\/span><div class=\"point\">Sunlight는 3인칭 단수라 현재형 동사에 -s를 붙여 comes로 써야 해!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">7.<\/span> warm → <span class=\"sol\"><b>warmed<\/b><\/span><div class=\"point\">집이 &#x27;데워지는&#x27; 거라 수동태! be동사(were) 뒤에는 과거분사 warmed를 써.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">8.<\/span> giving → <span class=\"sol\"><b>to give<\/b><\/span><div class=\"point\">offer는 뒤에 to부정사를 데려오는 동사야. 그래서 to give!<\/div><\/div>\n<div class=\"a-part\">유형 3 · 빈칸 어형 변화<\/div>\n<div class=\"a\"><span class=\"num\">9.<\/span> build → <span class=\"sol\"><b>built<\/b><\/span><div class=\"point\">과거 이야기라 과거형! build는 불규칙이라 built로 변해.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">10.<\/span> sunny → <span class=\"sol\"><b>sunniest<\/b><\/span><div class=\"point\">the가 붙고 &#x27;가장 ~한&#x27; 뜻이니 최상급! sunny는 y를 i로 바꿔 sunniest.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">11.<\/span> come → <span class=\"sol\"><b>came<\/b><\/span><div class=\"point\">과거의 일이니 과거형. come은 불규칙이라 came이 돼!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">12.<\/span> wonder → <span class=\"sol\"><b>wondering<\/b><\/span><div class=\"point\">keep 뒤에서 &#x27;계속 ~하다&#x27;는 동명사(-ing)로 써서 wondering!<\/div><\/div>\n<div class=\"a-part\">유형 4 · 조건부 부분 영작<\/div>\n<div class=\"a\"><span class=\"num\">13.<\/span> <span class=\"sol\"><b>That night, the younger sister slept peacefully.<\/b><\/span><div class=\"point\">과거 이야기라 sleep의 과거형 slept를 써야 해!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">14.<\/span> <span class=\"sol\"><b>All homes benefited from solar heating.<\/b><\/span><div class=\"point\">&#x27;~로부터 혜택을 받다&#x27;는 benefit from! 과거라 benefited로 써.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">15.<\/span> <span class=\"sol\"><b>In contrast, the older sister couldn&#x27;t sleep.<\/b><\/span><div class=\"point\">&#x27;~할 수 없었다&#x27;는 조동사 could의 부정 couldn&#x27;t로 나타내!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">16.<\/span> <span class=\"sol\"><b>She offered to give all her marbles in exchange for all her sister&#x27;s candies.<\/b><\/span><div class=\"point\">offer 뒤엔 to부정사! &#x27;~와 교환하여&#x27;는 in exchange for로 표현해.<\/div><\/div><\/div>", "116-117": "<div class=\"wb-ctrl\"><button type=\"button\" class=\"wb-gradeall\">📊 전체 채점<\/button><button type=\"button\" class=\"wb-toggle\">정답·해설 보기<\/button><\/div>\n<div class=\"wb-lead\">✏️ 4가지 유형 16문항 — 단어를 드래그하거나 입력한 뒤 <b>전체 채점<\/b>을 눌러 점수를 확인하세요. 문제마다 <b>확인<\/b>으로 즉시 채점도 돼요.<\/div>\n<div class=\"part\">\n<div class=\"part-h\"><span class=\"badge\">유형 1<\/span><h2>어순 배열 (Unscramble)<\/h2><\/div>\n<div class=\"howto\">단어를 <b>정답칸으로 끌어다 놓아(드래그)<\/b> 우리말 뜻에 맞게 배열하세요. 단어를 <b>클릭<\/b>해도 이동합니다. ⚠️ 표시 문제엔 <b>쓰지 않는 함정 단어 1개<\/b>가 있어요!<\/div>\n<div class=\"q dnd\" data-answer=\"The surgery took seven hours\"><div><span class=\"num\">1.<\/span><span class=\"ko\">수술은 7시간이 걸렸다.<\/span><\/div><div class=\"answer-zone empty\" data-ph=\"⬇ 여기에 단어를 순서대로 끌어다 놓으세요\"><\/div><div class=\"bank\"><span class=\"chip\">hours<\/span><span class=\"chip\">took<\/span><span class=\"chip\">The<\/span><span class=\"chip\">seven<\/span><span class=\"chip\">surgery<\/span><\/div><div class=\"dnd-ctrl\"><button type=\"button\" class=\"btn-check\">확인<\/button><button type=\"button\" class=\"btn-reset\">다시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"hint-drag\">💡 정답칸의 단어를 클릭하면 아래로 되돌아가요. 드래그로 순서도 바꿀 수 있어요.<\/div><div class=\"u-line\"><\/div><\/div>\n<div class=\"q dnd\" data-answer=\"The idea was to make something good for our planet\"><div><span class=\"num\">2.<\/span><span class=\"ko\">그 아이디어는 지구를 위해 좋은 일을 하자는 것이었다.<\/span><\/div><div class=\"answer-zone empty\" data-ph=\"⬇ 여기에 단어를 순서대로 끌어다 놓으세요\"><\/div><div class=\"bank\"><span class=\"chip\">for<\/span><span class=\"chip\">our<\/span><span class=\"chip\">planet<\/span><span class=\"chip\">The<\/span><span class=\"chip\">idea<\/span><span class=\"chip\">to<\/span><span class=\"chip\">something<\/span><span class=\"chip\">good<\/span><span class=\"chip\">was<\/span><span class=\"chip\">make<\/span><\/div><div class=\"dnd-ctrl\"><button type=\"button\" class=\"btn-check\">확인<\/button><button type=\"button\" class=\"btn-reset\">다시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"u-line\"><\/div><\/div>\n<div class=\"q dnd\" data-answer=\"It is an event for all the people who care about our planet\"><div><span class=\"num\">3.<\/span><span class=\"ko\">그것은 지구에 관심을 가진 모든 사람들을 위한 행사이다.<\/span><\/div><div class=\"answer-zone empty\" data-ph=\"⬇ 여기에 단어를 순서대로 끌어다 놓으세요\"><\/div><div class=\"bank\"><span class=\"chip\">planet<\/span><span class=\"chip\">our<\/span><span class=\"chip\">about<\/span><span class=\"chip\">It<\/span><span class=\"chip\">people<\/span><span class=\"chip\">who<\/span><span class=\"chip\">an<\/span><span class=\"chip\">for<\/span><span class=\"chip\">is<\/span><span class=\"chip\">event<\/span><span class=\"chip\">the<\/span><span class=\"chip\">care<\/span><span class=\"chip\">all<\/span><\/div><div class=\"dnd-ctrl\"><button type=\"button\" class=\"btn-check\">확인<\/button><button type=\"button\" class=\"btn-reset\">다시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"u-line\"><\/div><\/div>\n<div class=\"q dnd\" data-answer=\"Hundreds of millions of people join the movement from over 190 countries\" data-trap=\"joins\"><div><span class=\"num\">4.<\/span><span class=\"ko\">수억 명의 사람들이 190개가 넘는 나라에서 이 운동에 참여한다.<\/span> <span class=\"warn-tag\">⚠️ 함정 1개<\/span><\/div><div class=\"answer-zone empty\" data-ph=\"⬇ 여기에 단어를 순서대로 끌어다 놓으세요 (함정 주의!)\"><\/div><div class=\"bank\"><span class=\"chip\">of<\/span><span class=\"chip\">movement<\/span><span class=\"chip\">countries<\/span><span class=\"chip\">Hundreds<\/span><span class=\"chip\">people<\/span><span class=\"chip\">millions<\/span><span class=\"chip\">190<\/span><span class=\"chip\">from<\/span><span class=\"chip\">of<\/span><span class=\"chip\">the<\/span><span class=\"chip\">over<\/span><span class=\"chip\">join<\/span><span class=\"chip\">joins<\/span><\/div><div class=\"dnd-ctrl\"><button type=\"button\" class=\"btn-check\">확인<\/button><button type=\"button\" class=\"btn-reset\">다시<\/butt <button type=\"button\" class=\"iq-reveal\">정답 예시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<\/div>\n<div class=\"scorebox\" id=\"scorebox\"><\/div>\n<div class=\"wb-answers hide\" id=\"answerSheet\"><div class=\"a-h\">✅ 정답 및 해설<\/div>\n<div class=\"a-note\">pp.116~117 「독해 유형 완성 TEST」 · 각 문제의 <b>출제 포인트<\/b>를 함께 읽으며 스스로 채점해 보세요!<\/div>\n<div class=\"a-part\">유형 1 · 어순 배열<\/div>\n<div class=\"a\"><span class=\"num\">1.<\/span> <span class=\"sol\"><b>The surgery took seven hours<\/b><\/span><div class=\"point\">&#x27;걸리다(take)&#x27;의 과거형은 불규칙이라 taked가 아니라 took야!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">2.<\/span> <span class=\"sol\"><b>The idea was to make something good for our planet<\/b><\/span><div class=\"point\">&#x27;~하는 것&#x27;이라는 뜻은 was 뒤에 to부정사(to make)로 나타내!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">3.<\/span> <span class=\"sol\"><b>It is an event for all the people who care about our planet<\/b><\/span><div class=\"point\">사람(the people)을 꾸며주니까 관계대명사 who를 써!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">4.<\/span> <span class=\"sol\"><b>Hundreds of millions of people join the movement from over 190 countries<\/b><\/span> &nbsp;<span style=\"color:var(--warn)\">(함정 단어: joins ✗)<\/span><div class=\"point\">진짜 주어가 복수(people)라서 joins가 아니라 join이 맞아!<\/div><\/div>\n<div class=\"a-part\">유형 2 · 어법 오류 수정<\/div>\n<div class=\"a\"><span class=\"num\">5.<\/span> was considered → <span class=\"sol\"><b>were considered<\/b><\/span><div class=\"point\">주어 pigs가 복수라 was가 아니라 were! 게다가 &#x27;여겨지다&#x27;는 수동태라 be동사+p.p.야.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">6.<\/span> save → <span class=\"sol\"><b>saves<\/b><\/span><div class=\"point\">that절의 주어 it이 단수라서 동사에 -s를 붙여 saves로 써!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">7.<\/span> becomed → <span class=\"sol\"><b>became<\/b><\/span><div class=\"point\">become의 과거형은 불규칙! becomed가 아니라 became야.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">8.<\/span> save → <span class=\"sol\"><b>saving<\/b><\/span><div class=\"point\">전치사 of 뒤에는 동사원형이 아니라 동명사(saving)를 써!<\/div><\/div>\n<div class=\"a-part\">유형 3 · 빈칸 어형 변화<\/div>\n<div class=\"a\"><span class=\"num\">9.<\/span> transplant → <span class=\"sol\"><b>transplanted<\/b><\/span><div class=\"point\">역사상 처음 있었던 과거의 일이라 과거형 transplanted!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">10.<\/span> die → <span class=\"sol\"><b>died<\/b><\/span><div class=\"point\">이미 일어난 과거의 일이니까 die의 과거형 died!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">11.<\/span> switch off → <span class=\"sol\"><b>switched off<\/b><\/span><div class=\"point\">과거에 불을 껐으니 switch를 과거형 switched로 바꿔!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">12.<\/span> turn off → <span class=\"sol\"><b>turn off<\/b><\/span><div class=\"point\">매년 반복되는 현재의 일이고 주어 people이 복수라 turn 그대로 써!<\/div><\/div>\n<div class=\"a-part\">유형 4 · 조건부 부분 영작<\/div>\n<div class=\"a\"><span class=\"num\">13.<\/span> <span class=\"sol\"><b>The patient was 57-year-old David Bennett from Maryland, US.<\/b><\/span><div class=\"point\">과거의 사실을 말하니까 be동사는 was를 써!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">14.<\/span> <span class=\"sol\"><b>The surgery could be the beginning of hope.<\/b><\/span><div class=\"point\">&#x27;~일 수도 있다&#x27;는 가능성은 조동사 could로! 뒤에는 동사원형 be가 와.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">15.<\/span> <span class=\"sol\"><b>There were similar attempts in the past, but they were never successful.<\/b><\/span><div class=\"point\">서로 반대되는 두 내용을 이어줄 땐 접속사 but을 써!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">16.<\/span> <span class=\"sol\"><b>The Earth Hour movement started in Sydney, Australia in 2007.<\/b><\/span><div class=\"point\">2007년에 시작된 과거의 일이라 start를 started로 써!<\/div><\/div><\/div>", "120-121": "<div class=\"wb-ctrl\"><button type=\"button\" class=\"wb-gradeall\">📊 전체 채점<\/button><button type=\"button\" class=\"wb-toggle\">정답·해설 보기<\/button><\/div>\n< lass=\"ko\">알리바바는 당나귀들과 함께 도망치지 않았다.<\/span><\/div><div class=\"cond\">조건: <span class=\"chip\">run away<\/span><span class=\"chip\">didn&#x27;t<\/span><span class=\"chip\">donkeys<\/span><\/div><input type=\"text\" class=\"iq-input full\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"영어 문장을 입력하세요\"><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><button type=\"button\" class=\"iq-reveal\">정답 예시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<div class=\"q iq\" data-answer=\"Robbers didn&#x27;t notice that Ali Baba was in the forest.|Robbers didn&#x27;t notice Ali Baba was in the forest.|The robbers didn&#x27;t notice that Ali Baba was in the forest.\" data-example=\"Robbers didn&#x27;t notice that Ali Baba was in the forest.\"><div><span class=\"num\">14.<\/span><span class=\"ko\">강도들은 알리바바가 숲에 있다는 것을 알아차리지 못했다.<\/span><\/div><div class=\"cond\">조건: <span class=\"chip\">notice<\/span><span class=\"chip\">robbers<\/span><span class=\"chip\">forest<\/span><\/div><input type=\"text\" class=\"iq-input full\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"영어 문장을 입력하세요\"><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><button type=\"button\" class=\"iq-reveal\">정답 예시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<div class=\"q iq\" data-answer=\"One day, Ali Baba was in the forest.|Ali Baba was in the forest one day.\" data-example=\"One day, Ali Baba was in the forest.\"><div><span class=\"num\">15.<\/span><span class=\"ko\">어느 날 알리바바는 숲속에 있었다.<\/span><\/div><div class=\"cond\">조건: <span class=\"chip\">one day<\/span><span class=\"chip\">forest<\/span><\/div><input type=\"text\" class=\"iq-input full\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"영어 문장을 입력하세요\"><div class=\"iq-row\"><button type=\"button\" clas point\">진짜 주어는 복수 branches라서 was가 아니라 were! of the tree에 속지 마.<\/div><\/div>\n<div class=\"a-part\">유형 2 · 어법 오류 수정<\/div>\n<div class=\"a\"><span class=\"num\">5.<\/span> what → <span class=\"sol\"><b>that<\/b><\/span><div class=\"point\">사물 선행사(tree)가 있고 뒤 문장에 주어가 없으니 주격 관계대명사 that(또는 which)! what은 선행사를 못 받아.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">6.<\/span> discovered → <span class=\"sol\"><b>being discovered<\/b><\/span><div class=\"point\">전치사 without 뒤라 동명사가 와야 하고, &#x27;발견되는&#x27; 거니까 수동인 being discovered!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">7.<\/span> hided → <span class=\"sol\"><b>hid<\/b><\/span><div class=\"point\">hide는 불규칙 동사! 과거형은 hided가 아니라 hid야.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">8.<\/span> were → <span class=\"sol\"><b>was<\/b><\/span><div class=\"point\">주어가 단수 The path라서 were가 아니라 was! in the forest는 주어를 꾸미는 말일 뿐이야.<\/div><\/div>\n<div class=\"a-part\">유형 3 · 빈칸 어형 변화<\/div>\n<div class=\"a\"><span class=\"num\">9.<\/span> cut → <span class=\"sol\"><b>cut<\/b><\/span><div class=\"point\">have/has 뒤에는 과거분사! cut은 cut-cut-cut으로 형태가 안 변하는 불규칙 동사야.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">10.<\/span> observe → <span class=\"sol\"><b>observed<\/b><\/span><div class=\"point\">지난 일을 말하니까 observe에 -d를 붙여 과거형 observed로!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">11.<\/span> leave → <span class=\"sol\"><b>to leave<\/b><\/span><div class=\"point\">determine은 뒤에 to부정사를 데려와! 그래서 to leave가 맞아.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">12.<\/span> distinguish → <span class=\"sol\"><b>distinguished<\/b><\/span><div class=\"point\">곧이어 알아본 건 과거의 일! distinguish에 -ed를 붙여 distinguished.<\/div><\/div>\n<div class=\"a-part\">유형 4 · 조건부 부분 영작<\/div>\n<div class=\"a\"><span class=\"num\">13.<\/span> <span class=\"sol\"><b>Ali Baba didn&#x27;t run away with his donkeys.<\/b><\/span><div class=\"point\">과거 부정은 &#x27;didn&#x27;t + 동사원형&#x27;! did가 과거를 맡으니 run은 원형 그대로 써.<\/div><\/div>\n<div class=\"a\ ete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"?\"> ashamed of. <span class=\"given\">( be )<\/span><\/span><\/div><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<div class=\"q iq\" data-answer=\"looked\"><div><span class=\"num\">11.<\/span> <span class=\"sent\">The next day, Henry <input type=\"text\" class=\"iq-input inline\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"?\"> carefully into the telescope again. <span class=\"given\">( look )<\/span><\/span><\/div><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<div class=\"q iq\" data-answer=\"thought\"><div><span class=\"num\">12.<\/span> <span class=\"sent\">He <input type=\"text\" class=\"iq-input inline\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"?\"> he might have discovered a new star. <span class=\"given\">( think )<\/span><\/span><\/div><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<\/div>\n<div class=\"part\">\n<div class=\"part-h\"><span class=\"badge\">유형 4<\/span><h2>조건부 부분 영작 (Sentence Completion)<\/h2><\/div>\n<div class=\"howto\">우리말 뜻과 <b>주어진 핵심 단어<\/b>를 반드시 활용하여 <b>영어 문장을 완성<\/b>하고 <b>확인<\/b>을 누르세요. (단어의 형태는 바꿔도 좋아요. 대소문자·마침표·쉼표는 채점에서 무시됩니다.)<\/div>\n<div class=\"q iq\" data-answer=\"He arrived home feeling exhausted.|He arrived home feeling tired.\" data-example=\"He arrived home feeling exhausted.\"><div><span class=\"num\">13.<\/span><span class=\"ko\">그는 지친 채로 집에 도착했다.<\/span><\/div><div class=\"cond\">조건: <span class=\"chip\">arrive home<\/span><span class=\"chip\">exhausted<\/span><\/div><input type=\"text\" class=\"iq-input full\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"영어 문장을 입력하세요\"><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><button type=\"button\" class=\"iq-reveal\">정답 예시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<div class=\"q iq\" data-answer=\"He could see the stars on the far edges of the Milky Way.\" data-example=\"He could see the stars on the far edges of the Milky Way.\"><div><span class=\"num\">14.<\/span><span class=\"ko\">그는 은하수의 먼 가장자리에 있는 별들을 볼 수 있었다.<\/span><\/div><div class=\"cond\">조건: <span class=\"chip\">far edges<\/span><span class=\"chip\">the Milky Way<\/span><\/div><input type=\"text\" class=\"iq-input full\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"영어 문장을 입력하세요\"><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><button type=\"button\" class=\"iq-reveal\">정답 예시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<div class=\"q iq\" data-answer=\"It thrilled him.\" data-example=\"It thrilled him.\"><div><span class=\"num\">15.<\/span><span class=\"ko\">그것은 그를 흥분시켰다.<\/span><\/div><div class=\"cond\">조건: <span class=\"chip\">thrill<\/span><span class=\"chip\">him<\/span><\/div><input type=\"text\" class=\"iq-input full\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"영어 문장을 입력하세요\"><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><button type=\"button\" class=\"iq-reveal\">정답 예시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<div class=\"q iq\" data-answer=\"He looked at the sky, in particular, at nebulae.\" data-example=\"He looked at the sky, in particular, at nebulae.\"><div><span class=\"num\">16.<\/span><span class=\"ko\">그는 하늘을, 특히 성운들을 바라보았다.<\/span><\/div><div class=\"cond\">조건: <span class=\"chip\">in particular<\/span><span class=\"chip\">nebulae<\/span><\/div><input type=\"text\" class=\"iq-input full\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"영어 문장을 입력하세요\"><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><button type=\"button\" class=\"iq-reveal\">정답 예시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<\/div>\n<div class=\"scorebox\" id=\"scorebox\"><\/div>\n<div class=\"wb-answers hide\" id=\"answerSheet\"><div class=\"a-h\">✅ 정답 및 해설<\/div>\n<div class=\"a-note\">pp.126~127 「천문학자 Henry」 · 각 문제의 <b>출제 포인트<\/b>를 함께 읽으며 스스로 채점해 보세요!<\/div>\n<div class=\"a-part\">유형 1 · 어순 배열<\/div>\n<div class=\"a\"><span class=\"num\">1.<\/span> <span class=\"sol\"><b>He could see as far away as the distant stars<\/b><\/span> &nbsp;<span style=\"color:var(--warn)\">(함정 단어: farther ✗)<\/span><div class=\"point\">as ~ as는 &#x27;~만큼&#x27;이라는 원급 비교야. 비교급 farther가 아니라 as와 as 사이엔 원급 far를 넣어야 해!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">2.<\/span> <span class=\"sol\"><b>He was still looking for a tiny point of light in the sky<\/b><\/span><div class=\"point\">과거의 어느 순간에 진행 중이던 일이라 was + -ing(과거진행형)으로 써!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">3.<\/span> <span class=\"sol\"><b>He tried to turn the basic data into an image<\/b><\/span><div class=\"point\">try to + 동사원형은 &#x27;~하려고 애쓰다&#x27;야. to 뒤엔 동사원형 turn을 써!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">4.<\/span> <span class=\"sol\"><b>He checked the lists of numbers that his computer produced<\/b><\/span><div class=\"point\">numbers를 꾸며 주는 목적격 관계대명사 that! that절 안엔 produced의 목적어가 빠져 있지.<\/div><\/div>\n<div class=\"a-part\">유형 2 · 어법 오류 수정<\/div>\n<div class=\"a\"><span class=\"num\">5.<\/span> had saw → <span class=\"sol\"><b>had seen<\/b><\/span><div class=\"point\">과거의 그 시점보다 더 이전 일이라 과거완료 had + 과거분사! see의 과거분사는 saw가 아니라 seen이야.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">6.<\/span> embarrass → <span class=\"sol\"><b>embarrassed<\/b><\/span><div class=\"point\">주어가 &#x27;당황하게 되는&#x27; 대상이라 수동태! be동사 뒤엔 과거분사 embarrassed를 써.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">7.<\/span> Henry are → <span class=\"sol\"><b>Henry is<\/b><\/span><div class=\"point\">주어 Henry는 3인칭 단수라 be동사는 are가 아니라 is를 써야 해!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">8.<\/span> might is → <span class=\"sol\"><b>might be<\/b><\/span><div class=\"point\">조동사 might 뒤에는 무조건 동사원형! is가 아니라 be가 맞아.<\/div><\/div>\n<div class=\"a-part\">유형 3 · 빈칸 어형 변화<\/div>\n<div class=\"a\"><span class=\"num\">9.<\/span> discover → <span class=\"sol\"><b>discovered<\/b><\/span><div class=\"point\">과거보다 더 이전에 일어난 일이라 과거완료! had 다음엔 과거분사 discovered를 써.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">10.<\/span> be → <span class=\"sol\"><b>to be<\/b><\/span><div class=\"point\">nothing을 꾸며 주는 형용사적 용법이라 to부정사 to be로 써야 해.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">11.<\/span> look → <span class=\"sol\"><b>looked<\/b><\/span><div class=\"point\">&#x27;The next day(다음 날)&#x27;라 과거 이야기니까 look의 과거형 looked!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">12.<\/span> think → <span class=\"sol\"><b>thought<\/b><\/span><div class=\"point\">think는 불규칙 동사라 과거형이 thinked가 아니라 thought야!<\/div><\/div>\n<div class=\"a-part\">유형 4 · 조건부 부분 영작<\/div>\n<div class=\"a\"><span class=\"num\">13.<\/span> <span class=\"sol\"><b>He arrived home feeling exhausted.<\/b><\/span><div class=\"point\">&#x27;지친 채로&#x27;는 feeling exhausted처럼 분사로 상태를 나타내. arrive의 과거는 arrived!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">14.<\/span> <span class=\"sol\"><b>He could see the stars on the far edges of the Milky Way.<\/b><\/span><div class=\"point\">&#x27;~에 있는&#x27;은 전치사 on으로 이어. the far edges of the Milky Way 어순 그대로 써!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">15.<\/span> <span class=\"sol\"><b>It thrilled him.<\/b><\/span><div class=\"point\">&#x27;흥분시켰다&#x27;는 과거니까 thrill의 과거형 thrilled를 써!<\/div><\/ =\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<div class=\"q iq\" data-answer=\"comfortable\"><div><span class=\"num\">12.<\/span> <span class=\"sent\">It is not just something <input type=\"text\" class=\"iq-input inline\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"?\"> when it&#x27;s nearby. <span class=\"given\">( comfort )<\/span><\/span><\/div><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<\/div>\n<div class=\"part\">\n<div class=\"part-h\"><span class=\"badge\">유형 4<\/span><h2>조건부 부분 영작 (Sentence Completion)<\/h2><\/div>\n<div class=\"howto\">우리말 뜻과 <b>주어진 핵심 단어<\/b>를 반드시 활용하여 <b>영어 문장을 완성<\/b>하고 <b>확인<\/b>을 누르세요. (단어의 형태는 바꿔도 좋아요. 대소문자·마침표·쉼표는 채점에서 무시됩니다.)<\/div>\n<div class=\"q iq\" data-answer=\"You take it for granted.|You take it for granted\" data-example=\"You take it for granted.\"><div><span class=\"num\">13.<\/span><span class=\"ko\">당신은 그것을 당연하게 여긴다.<\/span><\/div><div class=\"cond\">조건: <span class=\"chip\">take<\/span><span class=\"chip\">for granted<\/span><span class=\"chip\">it<\/span><\/div><input type=\"text\" class=\"iq-input full\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"영어 문장을 입력하세요\"><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><button type=\"button\" class=\"iq-reveal\">정답 예시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<div class=\"q iq\" data-answer=\"You are unaware it&#x27;s there.|You are unaware that it&#x27;s there.|You are unaware it is there.\" data-example=\"You are unaware it&#x27;s there.\"><div><span class=\"num\">14.<\/span><span class=\"ko\">당신은 그것이 있는지 알아차리지 못한다.<\/span><\/div><div class=\"cond\">조건: <span class=\"chip\">unaware<\/span><span class=\"chip\">there<\/span><\/div><input type=\"text\" class=\"iq-input full\" 7 「광고로 가득한 세상」 · 각 문제의 <b>출제 포인트<\/b>를 함께 읽으며 스스로 채점해 보세요!<\/div>\n<div class=\"a-part\">유형 1 · 어순 배열<\/div>\n<div class=\"a\"><span class=\"num\">1.<\/span> <span class=\"sol\"><b>There is an old saying that describes today&#x27;s ad-filled world<\/b><\/span><div class=\"point\">‘속담(saying)’을 꾸며 주는 주격 관계대명사 that이야. that 바로 뒤에 동사(describes)가 오지!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">2.<\/span> <span class=\"sol\"><b>In this modern world advertising is everywhere<\/b><\/span> &nbsp;<span style=\"color:var(--warn)\">(함정 단어: are ✗)<\/span><div class=\"point\">주어 advertising은 셀 수 없는 단수라서 be동사는 are가 아니라 is를 써!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">3.<\/span> <span class=\"sol\"><b>Once people notice it there could be negative consequences<\/b><\/span><div class=\"point\">‘일단 ~하면’은 접속사 Once로 시작해. could be는 ‘있을 수 있다’라는 조동사 표현이야!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">4.<\/span> <span class=\"sol\"><b>There is so much of it that we hardly notice it anymore<\/b><\/span><div class=\"point\">‘너무 ~해서 …하다’는 so ~ that 구문! hardly는 그 자체로 ‘거의 ~않다’라는 부정의 뜻이야.<\/div><\/div>\n<div class=\"a-part\">유형 2 · 어법 오류 수정<\/div>\n<div class=\"a\"><span class=\"num\">5.<\/span> says → <span class=\"sol\"><b>say<\/b><\/span><div class=\"point\">주어가 consumers(복수)라서 동사에 -s를 붙이면 안 돼. say가 맞아!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">6.<\/span> has became → <span class=\"sol\"><b>has become<\/b><\/span><div class=\"point\">현재완료는 have/has + 과거분사! become의 과거분사는 became이 아니라 become이야.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">7.<\/span> stop to use → <span class=\"sol\"><b>stop using<\/b><\/span><div class=\"point\">stop 뒤에서 ‘~하는 걸 멈추다’는 동명사(using)를 써! stop to V는 ‘하려고 멈추다’로 뜻이 달라져.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">8.<\/span> should not to overlook → <span class=\"sol\"><b>should not overlook<\/b><\/span><div class=\"point\">조동사(should) 뒤에는 to 없이 동사원형이 와! should not overlook가 맞아.<\/div><\/div>\n<div class=\"a-part\">유형 3 · 빈칸 ><span class=\"badge\">유형 1<\/span><h2>어순 배열 (Unscramble)<\/h2><\/div>\n<div class=\"howto\">단어를 <b>정답칸으로 끌어다 놓아(드래그)<\/b> 우리말 뜻에 맞게 배열하세요. 단어를 <b>클릭<\/b>해도 이동합니다. ⚠️ 표시 문제엔 <b>쓰지 않는 함정 단어 1개<\/b>가 있어요!<\/div>\n<div class=\"q dnd\" data-answer=\"Testing is an important part of education\"><div><span class=\"num\">1.<\/span><span class=\"ko\">시험은 교육의 중요한 부분이다.<\/span><\/div><div class=\"answer-zone empty\" data-ph=\"⬇ 여기에 단어를 순서대로 끌어다 놓으세요\"><\/div><div class=\"bank\"><span class=\"chip\">Testing<\/span><span class=\"chip\">an<\/span><span class=\"chip\">part<\/span><span class=\"chip\">education<\/span><span class=\"chip\">important<\/span><span class=\"chip\">of<\/span><span class=\"chip\">is<\/span><\/div><div class=\"dnd-ctrl\"><button type=\"button\" class=\"btn-check\">확인<\/button><button type=\"button\" class=\"btn-reset\">다시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"hint-drag\">💡 정답칸의 단어를 클릭하면 아래로 되돌아가요. 드래그로 순서도 바꿀 수 있어요.<\/div><div class=\"u-line\"><\/div><\/div>\n<div class=\"q dnd\" data-answer=\"Sometimes testing is emphasized over learning\"><div><span class=\"num\">2.<\/span><span class=\"ko\">때때로 시험이 배움보다 더 강조된다.<\/span><\/div><div class=\"answer-zone empty\" data-ph=\"⬇ 여기에 단어를 순서대로 끌어다 놓으세요\"><\/div><div class=\"bank\"><span class=\"chip\">testing<\/span><span class=\"chip\">over<\/span><span class=\"chip\">learning<\/span><span class=\"chip\">is<\/span><span class=\"chip\">Sometimes<\/span><span class=\"chip\">emphasized<\/span><\/div><div class=\"dnd-ctrl\"><button type=\"button\" class=\"btn-check\">확인<\/button><button type=\"button\" class=\"btn-reset\">다시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"u-line\"><\/div><\/div>\n<div class=\"q dnd\" data-answer=\"They think scores are more important than learning\" data-trap=\"much\"><div><span class=\"num\">3.<\/span><span class=\"ko\">그들은 점수가 배움보다 더 중요하다고 생각한다.<\/span> <span class=\"warn-tag\">⚠️ 함정 1개<\/span><\/div><div class=\"answer-zone empty\" data-ph=\"⬇ 여기 g\"><div><span class=\"num\">9.<\/span> <span class=\"sent\">Students only study for the exams, not truly <input type=\"text\" class=\"iq-input inline\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"?\"> . <span class=\"given\">( learn )<\/span><\/span><\/div><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<div class=\"q iq\" data-answer=\"wagging\"><div><span class=\"num\">10.<\/span> <span class=\"sent\">But sometimes, the tail is <input type=\"text\" class=\"iq-input inline\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"?\"> the dog. <span class=\"given\">( wag )<\/span><\/span><\/div><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<div class=\"q iq\" data-answer=\"measures\"><div><span class=\"num\">11.<\/span> <span class=\"sent\">A teacher <input type=\"text\" class=\"iq-input inline\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"?\"> the progress of the students. <span class=\"given\">( measure )<\/span><\/span><\/div><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<div class=\"q iq\" data-answer=\"arises\"><div><span class=\"num\">12.<\/span> <span class=\"sent\">the nervousness that <input type=\"text\" class=\"iq-input inline\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"?\"> before or during an exam. <span class=\"given\">( arise )<\/span><\/span><\/div><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<\/div>\n<div class=\"part\">\n<div class=\"part-h\"><span class=\"badge\">유형 4<\/span><h2>조건부 부분 영작 (Sentence Completion)<\/h2><\/div>\n<div class=\"howto\">우리말 뜻과 <b>주어진 핵심 단어<\/b>를 반드시 활용하여 <b>영어 문장을 완성<\/b>하고 <b>확인<\/b>을 누르세요. (단어의 형태는 바꿔도 좋아요. 대소문자·마침표·쉼표는 채점에서 무시됩니다.)<\/div>\n<div class=\"q iq\" data-answer=\"Testing should be a means to an end, not an end in itself.\" data-example=\"Testing should be a means to an end, not an end in itself.\"><div><span class=\"num\">13.<\/span><span class=\"ko\">시험은 목적을 위한 수단이어야지, 그 자체가 목적이어서는 안 된다.<\/span><\/div><div class=\"cond\">조건: <span class=\"chip\">a means to an end<\/span><span class=\"chip\">not an end<\/span><\/div><input type=\"text\" class=\"iq-input full\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"영어 문장을 입력하세요\"><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><button type=\"button\" class=\"iq-reveal\">정답 예시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<div class=\"q iq\" data-answer=\"They memorize information for exams without any research.|They memorize information for the exams without any research.\" data-example=\"They memorize information for exams without any research.\"><div><span class=\"num\">14.<\/span><span class=\"ko\">그들은 아무 연구 없이 시험을 위해 정보를 암기한다.<\/span><\/div><div class=\"cond\">조건: <span class=\"chip\">memorize<\/span><span class=\"chip\">without<\/span><span class=\"chip\">research<\/span><\/div><input type=\"text\" class=\"iq-input full\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"영어 문장을 입력하세요\"><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><button type=\"button\" class=\"iq-reveal\">정답 예시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<div class=\"q iq\" data-answer=\"Test anxiety refers to the nervousness that arises before an exam.|Test anxiety refers to the nervousness that arises before exams.\" data-example=\"Test anxiety refers to the nervousness that arises before an exam.\"><div><span class=\"num\">15.<\/span><span class=\"ko\">시험 불안은 시험 전에 발생하는 초조함을 일컫는다.<\/span><\/div><div class=\"cond\">조건: <span class=\"chip\">refer to<\/span><span class=\"chip\">nervousness<\/span><span class=\"chip\">arise<\/span><\/div><input type=\"text\" class=\"iq-input full\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"영어 문장을 입력하세요\"><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><button type=\"button\" class=\"iq-reveal\">정답 예시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<div class=\"q iq\" data-answer=\"Testing has been an important part of education.\" data-example=\"Testing has been an important part of education.\"><div><span class=\"num\">16.<\/span><span class=\"ko\">시험은 오랫동안 교육의 중요한 부분이었다.<\/span><\/div><div class=\"cond\">조건: <span class=\"chip\">has been<\/span><span class=\"chip\">an important part<\/span><\/div><input type=\"text\" class=\"iq-input full\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"영어 문장을 입력하세요\"><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><button type=\"button\" class=\"iq-reveal\">정답 예시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<\/div>\n<div class=\"scorebox\" id=\"scorebox\"><\/div>\n<div class=\"wb-answers hide\" id=\"answerSheet\"><div class=\"a-h\">✅ 정답 및 해설<\/div>\n<div class=\"a-note\">pp.140~141 「시험의 목적」 · 각 문제의 <b>출제 포인트<\/b>를 함께 읽으며 스스로 채점해 보세요!<\/div>\n<div class=\"a-part\">유형 1 · 어순 배열<\/div>\n<div class=\"a\"><span class=\"num\">1.<\/span> <span class=\"sol\"><b>Testing is an important part of education<\/b><\/span><div class=\"point\">주어가 Testing(동명사)이라 단수 취급이야! 그래서 be동사는 are가 아니라 is를 써.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">2.<\/span> <span class=\"sol\"><b>Sometimes testing is emphasized over learning<\/b><\/span><div class=\"point\">&#x27;~되다&#x27;라는 수동의 뜻이지? be동사(is) + 과거분사(emphasized)로 수동태를 만들어.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">3.<\/span> <span class=\"sol\"><b>They think scores are more important than learning<\/b><\/span> &nbsp;<span style=\"color:var(--warn)\">(함정 단어: much ✗)<\/span><div class=\"point\">important처럼 긴 형용사는 -er 대신 앞에 more를 붙여! &#x27;more ~ than&#x27; 비교급이야. much는 필요 없어.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">4.<\/span> <span class=\"sol\"><b>Testing can be a powerful tool to promote learning<\/b><\/span><div class=\"point\">&#x27;~하기 위한&#x27; 도구처럼 목적을 나타낼 땐 &#x27;to + 동사원형&#x27;(to promote)을 써!<\/div><\/div>\n<div class=\"a-part\">유형 2 · 어법 오류 수정<\/div>\n<div class=\"a\"><span class=\"num\">5.<\/span> satisfy → <span class=\"sol\"><b>satisfied<\/b><\/span><div class=\"point\">be동사 뒤에서 &#x27;만족하다&#x27;는 satisfied(과거분사) 형태로 써. be satisfied with(~에 만족하다)를 통째로 외워!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">6.<\/span> puzzle → <span class=\"sol\"><b>puzzled<\/b><\/span><div class=\"point\">이미 지난 일이니까 과거시제야! puzzle에 -ed를 붙여 puzzled로 바꿔.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">7.<\/span> gives up → <span class=\"sol\"><b>give up<\/b><\/span><div class=\"point\">조동사 should 뒤에는 무조건 동사원형! 그래서 gives가 아니라 give up이야.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">8.<\/span> benefits → <span class=\"sol\"><b>benefit<\/b><\/span><div class=\"point\">주어 Students가 복수라서 동사에 -s를 붙이면 안 돼. 그냥 benefit!<\/div><\/div>\n<div class=\"a-part\">유형 3 · 빈칸 어형 변화<\/div>\n<div class=\"a\"><span class=\"num\">9.<\/span> learn → <span class=\"sol\"><b>learning<\/b><\/span><div class=\"point\">&#x27;진정으로 배우는 게 아니라&#x27;는 not truly learning! 앞 내용과 이어지는 분사(~ing) 형태로 써.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">10.<\/span> wag → <span class=\"sol\"><b>wagging<\/b><\/span><div class=\"point\">be동사(is) 뒤라서 진행형이야! wag는 짧은 모음+g라 g를 한 번 더 써서 wagging.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">11.<\/span> measure → <span class=\"sol\"><b>measures<\/b><\/span><div class=\"point\">주어가 A teacher(3인칭 단수)라 동사에 -s를 붙여야 해. measures가 정답!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">12.<\/span> arise → <span class=\"sol\"><b>arises<\/b><\/span><div class=\"point\">선행사 the nervousness가 단수라서 관계대명사 that 뒤 동사도 -s를 붙여 arises로 써.<\/div><\/div>\n<div class=\"a-part\">유형 4 · 조건부 부분 영작<\/div>\n<div class=\"a\"><span class=\"num\">13.<\/span> <span class=\"sol\"><b>Testing should be a means to an end, not an end in itself.<\/b><\/span><div class=\"point\">&#x27;수단&#x27;은 means(형태는 -s지만 단수 취급). &#x27;a means to an end(목적을 위한 수단)&#x27; 표현을 통째로 익혀!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">14.<\/span> <span class=\"sol\"><b>They memorize information for exams without any research.<\/b><\/span><div class=\"point\">전치사 without 뒤에는 명사(research)를 써. &#x27;~없이&#x27;라는 뜻이야.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">15.<\/span> <span class=\"sol\"><b>Test anxiety refers to the nervousness that arises before an exam.<\/b><\/span><div class=\"point\">&#x27;~을 일컫다&#x27;는 refer to. 주어가 단수라 refers, 관계대명사 that절 안의 동사도 arises로 -s를 붙여!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">16.<\/span> <span class=\"sol\"><b>Testing has been an important part of education.<\/b><\/span><div class=\"point\">과거부터 지금까지 쭉 이어질 땐 현재완료 has been(have/has + 과거분사)을 써!<\/div><\/div><\/div>", "142-143": "<div class=\"wb-ctrl\"><button type=\"button\" class=\"wb-gradeall\">📊 전체 채점<\/button><button type=\"button\" class=\"wb-toggle\">정답·해설 보기<\/button><\/div>\n<div class=\"wb-lead\">✏️ 4가지 유형 16문항 — 단어를 드래그하거나 입력한 뒤 <b>전체 채점<\/b>을 눌러 점수를 확인하세요. 문제마다 <b>확인<\/b>으로 즉시 채점도 돼요.<\/div>\n<div class=\"part\">\n<div class=\"part-h\"><span class=\"badge\">유형 1<\/span><h2>어순 배열 (Unscramble)<\/h2><\/div>\n<div class=\"howto\">단어를 <b>정답칸으로 끌어다 놓아(드래그)<\/b> 우리말 뜻에 맞게 배열하세요. 단어를 <b>클릭<\/b>해도 이동합니다. ⚠️ 표시 문제엔 <b>쓰지 않는 함정 단어 1개<\/b>가 있어요!<\/div>\n<div class=\"q dnd\" data-answer=\"A funeral ss=\"a\"><span class=\"num\">2.<\/span> <span class=\"sol\"><b>Once the funeral service ends the jazz funeral parade begins<\/b><\/span><div class=\"point\">Once는 &#x27;일단 ~하면&#x27;이라는 접속사야. 시간·조건을 말할 땐 미래라도 현재시제(ends, begins)를 써!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">3.<\/span> <span class=\"sol\"><b>New Orleans has a reputation for fine food and lively music<\/b><\/span> &nbsp;<span style=\"color:var(--warn)\">(함정 단어: have ✗)<\/span><div class=\"point\">주어 New Orleans는 하나(단수)라서 have가 아니라 has를 써야 해!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">4.<\/span> <span class=\"sol\"><b>People dance to the music singing and clapping<\/b><\/span><div class=\"point\">&#x27;~하면서&#x27;라는 동시동작은 동사에 -ing를 붙여서 singing, clapping처럼 표현해!<\/div><\/div>\n<div class=\"a-part\">유형 2 · 어법 오류 수정<\/div>\n<div class=\"a\"><span class=\"num\">5.<\/span> couples → <span class=\"sol\"><b>couple<\/b><\/span><div class=\"point\">주어가 두 단어(복수)라서 동사에 -s를 붙이면 안 돼. couple이 맞아!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">6.<\/span> lays → <span class=\"sol\"><b>is laid<\/b><\/span><div class=\"point\">고인은 &#x27;안장되는&#x27; 대상이지? 그래서 be동사+p.p. 형태의 수동태 is laid를 써!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">7.<\/span> celebrating → <span class=\"sol\"><b>to celebrate<\/b><\/span><div class=\"point\">try는 &#x27;~하려고 노력하다&#x27;일 때 뒤에 to부정사가 와. try to celebrate!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">8.<\/span> launch → <span class=\"sol\"><b>launches<\/b><\/span><div class=\"point\">주어 band는 하나(단수)라서 동사에 -es를 붙여 launches가 맞아!<\/div><\/div>\n<div class=\"a-part\">유형 3 · 빈칸 어형 변화<\/div>\n<div class=\"a\"><span class=\"num\">9.<\/span> bury → <span class=\"sol\"><b>buried<\/b><\/span><div class=\"point\">전치사 of 뒤라 동명사 being, 그리고 &#x27;묻히는&#x27; 수동이니 뒤엔 과거분사 buried!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">10.<\/span> become → <span class=\"sol\"><b>became<\/b><\/span><div class=\"point\">과거 이야기라 과거형인데, become은 불규칙이라 becomed가 아니라 became이야!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">11.<\/span> grow → <span class=\"sol\"><b>has grown<\/b><\/span><div class=\"point\">&#x27;세월에 걸쳐 계속&#x27;이면 현재완료 have/has+p.p.! grow는 grow-grew-grown 불규칙이야.<\/div><\/div>\n<div class=\"a\"><span class=\"num\">12.<\/span> lay → <span class=\"sol\"><b>laid<\/b><\/span><div class=\"point\">was 뒤 수동태라 과거분사가 필요해. lay는 lay-laid-laid 불규칙이라 laid!<\/div><\/div>\n<div class=\"a-part\">유형 4 · 조건부 부분 영작<\/div>\n<div class=\"a\"><span class=\"num\">13.<\/span> <span class=\"sol\"><b>The band that plays jazz marches down the street.<\/b><\/span><div class=\"point\">앞의 명사 band를 꾸며주는 주격 관계대명사 that(또는 which)을 써!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">14.<\/span> <span class=\"sol\"><b>Funerals in New Orleans are more joyous than in other cities.<\/b><\/span><div class=\"point\">긴 형용사의 비교급은 more+형용사, 그리고 비교 대상 앞엔 than!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">15.<\/span> <span class=\"sol\"><b>People dance to celebrate the deceased.<\/b><\/span><div class=\"point\">&#x27;~하기 위해&#x27;라는 목적은 to부정사(to celebrate)로 나타내!<\/div><\/div>\n<div class=\"a\"><span class=\"num\">16.<\/span> <span class=\"sol\"><b>The jazz funeral is the most famous tradition in New Orleans.<\/b><\/span><div class=\"point\">긴 형용사의 최상급은 the most+형용사! &#x27;가장 ~한&#x27;이라는 뜻이야.<\/div><\/div><\/div>", "144-145": "<div class=\"wb-ctrl\"><button type=\"button\" class=\"wb-gradeall\">📊 전체 채점<\/button><button type=\"button\" class=\"wb-toggle\">정답·해설 보기<\/button><\/div>\n<div class=\"wb-lead\">✏️ 4가지 유형 16문항 — 단어를 드래그하거나 입력한 뒤 <b>전체 채점<\/b>을 눌러 점수를 확인하세요. 문제마다 <b>확인<\/b>으로 즉시 채점도 돼요.<\/div>\n<div class=\"part\">\n<div class=\"part-h\"><span class=\"badge\">유형 1<\/span><h2>어순 배열 (Unscramble)<\/h2><\/div>\n<div class=\"howto\">단어를 <b>정답칸으로 끌어다 놓아(드래그)<\/b> 우리말 뜻에 맞게 배열하세요. 단어를 <b>클릭<\/b>해도 이동합니다. ⚠️ 표시 문제엔 <b>쓰지 않는 함정 단어 1개<\/b>가 있어요!<\/div>\n<div class=\"q dnd\" data-answer=\"Madagascar was a place with the richest biodiversity in the world\"><div><span class \">families<\/span><span class=\"chip\">eat<\/span><span class=\"chip\">to<\/span><span class=\"chip\">survive<\/span><span class=\"chip\">insects<\/span><\/div><div class=\"dnd-ctrl\"><button type=\"button\" class=\"btn-check\">확인<\/button><button type=\"button\" class=\"btn-reset\">다시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"u-line\"><\/div><\/div>\n<div class=\"q dnd\" data-answer=\"Even though people plant seeds no plants grow without water\"><div><span class=\"num\">4.<\/span><span class=\"ko\">사람들이 씨앗을 심어도 물 없이는 식물이 자라지 않는다.<\/span><\/div><div class=\"answer-zone empty\" data-ph=\"⬇ 여기에 단어를 순서대로 끌어다 놓으세요\"><\/div><div class=\"bank\"><span class=\"chip\">grow<\/span><span class=\"chip\">no<\/span><span class=\"chip\">water<\/span><span class=\"chip\">without<\/span><span class=\"chip\">people<\/span><span class=\"chip\">though<\/span><span class=\"chip\">plants<\/span><span class=\"chip\">plant<\/span><span class=\"chip\">Even<\/span><span class=\"chip\">seeds<\/span><\/div><div class=\"dnd-ctrl\"><button type=\"button\" class=\"btn-check\">확인<\/button><button type=\"button\" class=\"btn-reset\">다시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"u-line\"><\/div><\/div>\n<\/div>\n<div class=\"part\">\n<div class=\"part-h\"><span class=\"badge\">유형 2<\/span><h2>어법 오류 수정 (Error Correction)<\/h2><\/div>\n<div class=\"howto\"><b>밑줄 친 부분<\/b>에 어법상 틀린 곳이 있어요. 틀린 부분을 찾아 <b>바르게 고친 표현<\/b>을 입력하고 <b>확인<\/b>을 누르세요.<\/div>\n<div class=\"q iq\" data-answer=\"continues\"><div><span class=\"num\">5.<\/span> <span class=\"sent\">If this <span class=\"underline\">continue<\/span> , Madagascar could become the first country to experience hunger.<\/span><\/div><div class=\"iq-row\"><span class=\"cond\">→ 고친 표현:<\/span><input type=\"text\" class=\"iq-input\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"정답 입력\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><span class=\"verdict\"><\/span><\/div><di
