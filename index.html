<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학습 도구</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            width: 100%;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 60px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.95;
            font-weight: 300;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 40px 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 350px;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }

        .card:active {
            transform: translateY(-5px);
        }

        .icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .card h2 {
            font-size: 1.8rem;
            color: #333;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .card p {
            color: #666;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .badge {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-top: 10px;
        }

        .jaistory-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .cheonilmun-badge {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .math-badge {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }

        .footer {
            text-align: center;
            color: white;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .header p {
                font-size: 0.95rem;
            }

            .card {
                min-height: 300px;
                padding: 30px 20px;
            }

            .icon {
                font-size: 3rem;
            }

            .card h2 {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 학습 도구</h1>
            <p>학습할 도구를 선택하세요</p>
        </div>

        <div class="cards">
            <a href="./jaistory.html" class="card">
                <div class="icon">📖</div>
                <h2>자이스토리</h2>
                <p>자이스토리 중등 영어 독해 기본 2<br>(pp.74~161) · 33세트 · 920단어</p>
                <span class="badge jaistory-badge">바로 입장</span>
            </a>

            <a href="https://hong-jame.github.io/cheonilmun-voca-workbook/" class="card">
                <div class="icon">✨</div>
                <h2>천일문</h2>
                <p>천일문 기초영어 단어장<br>필수 암기 단어들을 효율적으로 학습</p>
                <span class="badge cheonilmun-badge">바로 입장</span>
            </a>

            <a href="https://hong-jame.github.io/triangle-congruence-notes/" class="card">
                <div class="icon">📐</div>
                <h2>수학 오답노트 1</h2>
                <p>삼각형의 합동 활용<br>회전 합동으로 각 구하기 · 유사문제 채점</p>
                <span class="badge math-badge">바로 입장</span>
            </a>
        </div>

        <div class="footer">
            <p>💡 팁: 학습 기록과 즐겨찾기는 각 기기의 브라우저에 저장됩니다</p>
        </div>
    </div>
</body>
</html>
